<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tupperlife by Kaat - Dashboard</title>
    
    <!-- PWA & Favicon Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#059669">
    
    <!-- Standaard Favicons -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    
    <!-- Apple Touch Icon (iPhone/iPad) -->
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    
    <!-- Android / Chrome / PWA -->
    <link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png">
    
    <!-- Windows Metro Tile -->
    <meta name="msapplication-TileImage" content="android-chrome-192x192.png">
    <meta name="msapplication-TileColor" content="#059669">

    <!-- 1. EXTREME LIBRARIES & STYLES -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Configureer Tailwind voor dark mode via class strategie
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            bg: '#0f172a',      // Slate 900
                            card: '#1e293b',    // Slate 800
                            border: '#334155',  // Slate 700
                            input: '#334155',   // Slate 700
                            text: '#f1f5f9',    // Slate 100
                            muted: '#94a3b8'    // Slate 400
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

    <!-- Foutafhandeling voor debugging -->
    <script>
        window.onerror = function(msg, url, line, col, error) {
            var div = document.getElementById('debug-console');
            if (div) {
                div.style.display = 'block';
                div.innerHTML += `<div style="margin-bottom: 10px; border-bottom: 1px solid #ccc;"><strong>Fout:</strong> ${msg}<br><small>Regel ${line}</small></div>`;
            }
            return false;
        };
    </script>

    <!-- Firebase Configuraties script -->
    <script src="firebase-setup.js"></script>

    <style>
        .loading-text { font-family: sans-serif; text-align: center; margin-top: 50px; color: #666; }
        .debug-box { display:none; position: fixed; top: 0; left: 0; right: 0; background: #fff0f0; border-bottom: 2px solid red; color: #d8000c; padding: 20px; z-index: 9999; max-height: 50vh; overflow: auto; font-family: monospace; }
        
        /* Animaties */
        @keyframes modalFade { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .modal-content { animation: modalFade 0.2s ease-out forwards; }
        .animate-in { animation: modalFade 0.3s ease-out forwards; }
        
        /* Custom scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
        
        /* Dark mode scrollbar */
        .dark .custom-scroll::-webkit-scrollbar-thumb { background: #475569; }
        .dark .custom-scroll::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-dark-bg font-sans text-slate-800 dark:text-dark-text transition-colors duration-300">

    <div id="debug-console" class="debug-box">
        <h3 style="margin-top: 0; font-weight: bold;">⚠️ Er is een fout opgetreden:</h3>
    </div>

    <div id="root">
        <div class="loading-text">
            <h1>Dashboard wordt geladen...</h1>
            <i class="fa-solid fa-spinner fa-spin" style="font-size: 2em; margin-top: 20px; color: #059669;"></i>
        </div>
    </div>

    <!-- 3. JAVASCRIPT BESTAND -->
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // --- CONFIGURATIE ---
        const ADMIN_EMAILS = ['jaiderjannis@gmail.com', 'kaat.tupperware@gmail.com']; 
        const MONTHS = ['Januari', 'Februari', 'Maart', 'April', 'Mei', 'Juni', 'Juli', 'Augustus', 'September', 'Oktober', 'November', 'December'];
        
        // --- REACT COMPONENTEN VOOR ICONEN ---
        const Icons = {
            Loader: ({className}) => <i className={`fa-solid fa-spinner fa-spin ${className||''}`}></i>,
            LogOut: () => <i className="fa-solid fa-right-from-bracket"></i>,
            ChevronDown: () => <i className="fa-solid fa-chevron-down"></i>,
            ChevronUp: () => <i className="fa-solid fa-chevron-up"></i>,
            ChevronLeft: () => <i className="fa-solid fa-chevron-left"></i>,
            ChevronRight: () => <i className="fa-solid fa-chevron-right"></i>,
            Gift: () => <i className="fa-solid fa-gift"></i>,
            Plus: () => <i className="fa-solid fa-plus"></i>,
            Trash: () => <i className="fa-solid fa-trash"></i>,
            CheckCircle: ({className}) => <i className={`fa-solid fa-circle-check ${className||''}`}></i>,
            Image: ({className}) => <i className={`fa-regular fa-image ${className||''}`}></i>,
            Settings: ({className}) => <i className={`fa-solid fa-gear ${className||''}`}></i>,
            X: ({className}) => <i className={`fa-solid fa-xmark ${className||''}`}></i>,
            User: ({className}) => <i className={`fa-solid fa-user ${className||''}`}></i>,
            Upload: () => <i className="fa-solid fa-upload"></i>,
            Users: () => <i className="fa-solid fa-users"></i>,
            Shield: ({className}) => <i className={`fa-solid fa-user-shield ${className||''}`}></i>,
            Clipboard: () => <i className="fa-solid fa-clipboard-list"></i>,
            Check: () => <i className="fa-solid fa-check"></i>,
            Package: ({className}) => <i className={`fa-solid fa-box-open ${className||''}`}></i>,
            Box: () => <i className="fa-solid fa-box"></i>,
            Layers: () => <i className="fa-solid fa-layer-group"></i>,
            Search: () => <i className="fa-solid fa-magnifying-glass"></i>,
            Edit: () => <i className="fa-solid fa-pen"></i>,
            Euro: () => <i className="fa-solid fa-euro-sign"></i>,
            Hash: () => <i className="fa-solid fa-hashtag"></i>,
            Lock: ({className}) => <i className={`fa-solid fa-lock ${className||''}`}></i>,
            Unlock: ({className}) => <i className={`fa-solid fa-lock-open ${className||''}`}></i>,
            Eye: () => <i className="fa-solid fa-eye"></i>,
            EyeSlash: () => <i className="fa-solid fa-eye-slash"></i>,
            ToggleOn: ({className}) => <i className={`fa-solid fa-toggle-on ${className||''}`}></i>,
            ToggleOff: ({className}) => <i className={`fa-solid fa-toggle-off ${className||''}`}></i>,
            Moon: ({className}) => <i className={`fa-solid fa-moon ${className||''}`}></i>,
            Sun: () => <i className="fa-solid fa-sun"></i>,
            Calendar: () => <i className="fa-solid fa-calendar-days"></i>,
            Target: () => <i className="fa-solid fa-bullseye"></i>,
            AddressBook: () => <i className="fa-solid fa-address-book"></i>,
            Phone: () => <i className="fa-solid fa-phone"></i>,
            MapPin: () => <i className="fa-solid fa-map-pin"></i>,
            Envelope: () => <i className="fa-solid fa-envelope"></i>,
            Bars: () => <i className="fa-solid fa-bars"></i>,
            BookOpen: () => <i className="fa-solid fa-book-open"></i>,
            Utensils: () => <i className="fa-solid fa-utensils"></i>,
            Printer: () => <i className="fa-solid fa-print"></i>,
            Shirt: () => <i className="fa-solid fa-shirt"></i>,
            Filter: () => <i className="fa-solid fa-filter"></i>,
            Crown: ({className}) => <i className={`fa-solid fa-crown ${className||''}`}></i>
        };

        // --- KLEUREN PALET ---
        const CATEGORY_COLORS = [
            { name: 'Smaragd', bg: 'bg-emerald-100 dark:bg-emerald-900', text: 'text-emerald-700 dark:text-emerald-200' },
            { name: 'Groenblauw', bg: 'bg-teal-100 dark:bg-teal-900', text: 'text-teal-700 dark:text-teal-200' },
            { name: 'Cyaan', bg: 'bg-cyan-100 dark:bg-cyan-900', text: 'text-cyan-700 dark:text-cyan-200' },
            { name: 'Hemelsblauw', bg: 'bg-sky-100 dark:bg-sky-900', text: 'text-sky-700 dark:text-sky-200' },
            { name: 'Blauw', bg: 'bg-blue-100 dark:bg-blue-900', text: 'text-blue-700 dark:text-blue-200' },
            { name: 'Indigo', bg: 'bg-indigo-100 dark:bg-indigo-900', text: 'text-indigo-700 dark:text-indigo-200' },
            { name: 'Violet', bg: 'bg-violet-100 dark:bg-violet-900', text: 'text-violet-700 dark:text-violet-200' },
            { name: 'Paars', bg: 'bg-purple-100 dark:bg-purple-900', text: 'text-purple-700 dark:text-purple-200' },
            { name: 'Fuchsia', bg: 'bg-fuchsia-100 dark:bg-fuchsia-900', text: 'text-fuchsia-700 dark:text-fuchsia-200' },
            { name: 'Roze', bg: 'bg-pink-100 dark:bg-pink-900', text: 'text-pink-700 dark:text-pink-200' },
            { name: 'Rozerood', bg: 'bg-rose-100 dark:bg-rose-900', text: 'text-rose-700 dark:text-rose-200' },
            { name: 'Rood', bg: 'bg-red-100 dark:bg-red-900', text: 'text-red-700 dark:text-red-200' },
            { name: 'Oranje', bg: 'bg-orange-100 dark:bg-orange-900', text: 'text-orange-700 dark:text-orange-200' },
            { name: 'Amber', bg: 'bg-amber-100 dark:bg-amber-900', text: 'text-amber-700 dark:text-amber-200' },
            { name: 'Geel', bg: 'bg-yellow-100 dark:bg-yellow-900', text: 'text-yellow-700 dark:text-yellow-200' },
            { name: 'Limoen', bg: 'bg-lime-100 dark:bg-lime-900', text: 'text-lime-700 dark:text-lime-200' },
            { name: 'Leisteen', bg: 'bg-slate-100 dark:bg-slate-700', text: 'text-slate-700 dark:text-slate-200' },
            { name: 'Zink', bg: 'bg-zinc-100 dark:bg-zinc-800', text: 'text-zinc-700 dark:text-zinc-200' },
            { name: 'Neutraal', bg: 'bg-neutral-100 dark:bg-neutral-800', text: 'text-neutral-700 dark:text-neutral-200' },
            { name: 'Steen', bg: 'bg-stone-100 dark:bg-stone-800', text: 'text-stone-700 dark:text-stone-200' },
        ];

        // --- KLANTEN MODULE ---
        const CustomersTab = ({ targetUid }) => {
            const [customers, setCustomers] = useState([]);
            const [input, setInput] = useState({ name: '', email: '', phone: '', address: '', note: '' });
            const [editingId, setEditingId] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');

            useEffect(() => {
                if(!targetUid) return;
                const unsub = window.db.collection('users').doc(targetUid).collection('customers').orderBy('name').onSnapshot(snap => {
                    setCustomers(snap.docs.map(d => ({id: d.id, ...d.data()})));
                });
                return () => unsub();
            }, [targetUid]);

            const handleSave = async () => {
                if(!input.name) return;
                if(editingId) {
                    await window.db.collection('users').doc(targetUid).collection('customers').doc(editingId).update(input);
                    setEditingId(null);
                } else {
                    await window.db.collection('users').doc(targetUid).collection('customers').add(input);
                }
                setInput({ name: '', email: '', phone: '', address: '', note: '' });
            };

            const handleDelete = async (id) => { if(confirm("Klant verwijderen?")) await window.db.collection('users').doc(targetUid).collection('customers').doc(id).delete(); };
            
            const filtered = customers.filter(c => c.name.toLowerCase().includes(searchTerm.toLowerCase()));

            return (
                <div className="space-y-6">
                    <div className={`p-4 rounded-xl border shadow-sm transition-colors ${editingId ? 'bg-amber-50 dark:bg-amber-900/20 border-amber-200 dark:border-amber-700' : 'bg-white dark:bg-dark-card border-slate-200 dark:border-slate-700'}`}>
                        <h3 className="font-bold mb-3 flex items-center gap-2 text-slate-700 dark:text-slate-200"><Icons.AddressBook className="text-purple-500"/> {editingId ? 'Klant Wijzigen' : 'Nieuwe Klant'}</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <input value={input.name} onChange={e=>setInput({...input, name:e.target.value})} placeholder="Naam" className="border dark:border-slate-600 dark:bg-slate-800 dark:text-white p-2 rounded outline-none"/>
                            <input value={input.email} onChange={e=>setInput({...input, email:e.target.value})} placeholder="Email" className="border dark:border-slate-600 dark:bg-slate-800 dark:text-white p-2 rounded outline-none"/>
                            <input value={input.phone} onChange={e=>setInput({...input, phone:e.target.value})} placeholder="Telefoon" className="border dark:border-slate-600 dark:bg-slate-800 dark:text-white p-2 rounded outline-none"/>
                            <input value={input.address} onChange={e=>setInput({...input, address:e.target.value})} placeholder="Adres" className="border dark:border-slate-600 dark:bg-slate-800 dark:text-white p-2 rounded outline-none"/>
                            <input value={input.note} onChange={e=>setInput({...input, note:e.target.value})} placeholder="Notitie" className="md:col-span-2 border dark:border-slate-600 dark:bg-slate-800 dark:text-white p-2 rounded outline-none"/>
                        </div>
                        <button onClick={handleSave} className={`w-full mt-3 py-2 text-white font-bold rounded shadow-sm ${editingId?'bg-amber-600':'bg-purple-600'}`}>{editingId ? 'Opslaan' : 'Toevoegen'}</button>
                    </div>

                    <div className="bg-white dark:bg-dark-card p-4 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm">
                        <input className="w-full mb-4 p-2 border dark:border-slate-600 dark:bg-slate-800 dark:text-white rounded" placeholder="Zoek klant..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)}/>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                            {filtered.map(c => (
                                <div key={c.id} className="border dark:border-slate-600 p-3 rounded-lg hover:border-purple-300 dark:hover:border-purple-700 relative group">
                                    <div className="font-bold text-slate-800 dark:text-slate-200">{c.name}</div>
                                    <div className="text-xs text-slate-500 dark:text-slate-400 space-y-1 mt-1">
                                        {c.email && <div className="flex items-center gap-2"><Icons.Envelope className="w-3"/> {c.email}</div>}
                                        {c.phone && <div className="flex items-center gap-2"><Icons.Phone className="w-3"/> {c.phone}</div>}
                                        {c.address && <div className="flex items-center gap-2"><Icons.MapPin className="w-3"/> {c.address}</div>}
                                    </div>
                                    <div className="absolute top-2 right-2 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                        <button onClick={()=>{setInput(c);setEditingId(c.id);window.scrollTo({top:0,behavior:'smooth'})}} className="text-slate-400 hover:text-amber-500"><Icons.Edit/></button>
                                        <button onClick={()=>handleDelete(c.id)} className="text-slate-400 hover:text-red-500"><Icons.Trash/></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // --- CLUB GOLD MODULE BINNENIN OVERZICHT ---
        const ClubTab = ({ targetUid, monthlyData, selectedYear, formatCurrency }) => {
            const [goal, setGoal] = useState({ amount: 40000 });
            const [isEditing, setIsEditing] = useState(false);
            const [isExpanded, setIsExpanded] = useState(false);

            useEffect(() => {
                if(!targetUid) return;
                const unsub = window.db.collection('users').doc(targetUid).collection('settings').doc(`clubgold_${selectedYear}`)
                    .onSnapshot(doc => {
                        if(doc.exists) setGoal({ amount: doc.data().amount || 40000 });
                    });
                return () => unsub();
            }, [targetUid, selectedYear]);

            const saveGoal = async (e) => {
                e?.stopPropagation();
                await window.db.collection('users').doc(targetUid).collection('settings').doc(`clubgold_${selectedYear}`).set(goal, {merge: true});
                setIsEditing(false);
            };

            // Bereken totaal van ALLES in dit jaar
            const totalSales = MONTHS.reduce((acc, m) => {
                let t = 0;
                const d = monthlyData[m] || {};
                for (let i = 1; i <= 6; i++) t += Number(d[`week${i}`]) || 0;
                return acc + t;
            }, 0);

            const progressPercent = goal.amount > 0 ? Math.min(100, (totalSales / goal.amount) * 100) : 0;

            return (
                <div className="mb-6">
                    <div 
                        onClick={() => setIsExpanded(!isExpanded)}
                        className="bg-[#0f0f0f] p-4 sm:p-6 rounded-xl border-2 border-amber-400 shadow-lg shadow-amber-500/10 cursor-pointer transition-all hover:border-amber-300"
                    >
                        <div className="flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 rounded-full bg-amber-500/20 flex items-center justify-center text-amber-400 shrink-0">
                                    <Icons.Crown />
                                </div>
                                <div>
                                    <h3 className="font-black text-amber-400 text-lg sm:text-xl uppercase tracking-wider">
                                        Club Gold {selectedYear}
                                    </h3>
                                    {isExpanded && <p className="text-xs sm:text-sm text-slate-400 mt-1">Jouw voortgang voor de ultieme status.</p>}
                                </div>
                            </div>
                            <div className="flex items-center gap-4">
                                {!isExpanded && (
                                    <div className="text-right hidden sm:block">
                                        <div className="text-amber-400 font-bold text-lg leading-none">{formatCurrency(totalSales)} <span className="text-amber-600">/ {formatCurrency(goal.amount)}</span></div>
                                        {totalSales < goal.amount ? (
                                            <div className="text-[11px] text-amber-500/70 font-medium mt-1.5 tracking-wide">Nog {formatCurrency(goal.amount - totalSales)} te gaan</div>
                                        ) : (
                                            <div className="text-[11px] text-amber-400 font-bold mt-1.5 tracking-widest uppercase">Doel Behaald!</div>
                                        )}
                                    </div>
                                )}
                                <div className="w-8 h-8 rounded-full bg-amber-500/10 flex items-center justify-center shrink-0">
                                    <Icons.ChevronDown className={`text-amber-400 transition-transform ${isExpanded ? 'rotate-180' : ''}`} />
                                </div>
                            </div>
                        </div>

                        {isExpanded && (
                            <div className="mt-6 pt-6 border-t border-amber-900/30" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-end mb-4">
                                    <button onClick={() => setIsEditing(!isEditing)} className="px-3 py-1.5 bg-amber-500/10 text-amber-400 border border-amber-500/30 rounded hover:bg-amber-500/20 transition-colors font-bold text-xs uppercase tracking-wider">
                                        {isEditing ? 'Annuleren' : 'Doel Aanpassen'}
                                    </button>
                                </div>

                                {isEditing && (
                                    <div className="bg-[#1a1a1a] p-4 rounded-lg border border-amber-900 mb-6 flex flex-col sm:flex-row gap-4 items-end animate-in">
                                        <div className="w-full">
                                            <label className="text-xs font-bold text-amber-500 uppercase tracking-wider mb-1 block">Doelbedrag (€)</label>
                                            <input type="number" value={goal.amount} onChange={e=>setGoal({amount: Number(e.target.value)})} className="w-full p-2.5 rounded border border-amber-700/50 bg-black text-amber-100 outline-none focus:border-amber-400 font-mono text-lg"/>
                                        </div>
                                        <button onClick={saveGoal} className="w-full sm:w-auto px-8 py-2.5 bg-gradient-to-r from-amber-600 to-amber-500 hover:from-amber-500 hover:to-amber-400 text-black font-black rounded shadow-sm uppercase tracking-wider transition-all">Opslaan</button>
                                    </div>
                                )}

                                <div className="relative">
                                    <div className="flex justify-between items-end mb-3">
                                        <div>
                                            <div className="text-[10px] sm:text-xs text-amber-600 font-bold uppercase tracking-widest mb-1">Huidige Verkoop</div>
                                            <div className="text-2xl sm:text-4xl font-black text-amber-100">{formatCurrency(totalSales)}</div>
                                        </div>
                                        <div className="text-right">
                                            <div className="text-[10px] sm:text-xs text-amber-600 font-bold uppercase tracking-widest mb-1">Doel</div>
                                            <div className="text-lg sm:text-2xl font-bold text-amber-400">{formatCurrency(goal.amount)}</div>
                                        </div>
                                    </div>
                                    
                                    <div className="h-6 sm:h-8 w-full bg-[#111] rounded-full overflow-hidden shadow-inner border border-amber-900/50 relative">
                                        <div className="h-full bg-gradient-to-r from-amber-700 via-amber-400 to-yellow-300 transition-all duration-1000 relative" style={{width: `${progressPercent}%`}}>
                                            <div className="absolute inset-0 opacity-20" style={{ backgroundImage: 'linear-gradient(45deg,rgba(255,255,255,1) 25%,transparent 25%,transparent 50%,rgba(255,255,255,1) 50%,rgba(255,255,255,1) 75%,transparent 75%,transparent)' , backgroundSize: '2rem 2rem'}}></div>
                                        </div>
                                        <div className="absolute inset-0 flex items-center justify-center mix-blend-difference text-white text-xs sm:text-sm font-black tracking-widest drop-shadow-md">
                                            {Math.round(progressPercent)}%
                                        </div>
                                    </div>

                                    {totalSales < goal.amount && (
                                        <div className="text-xs sm:text-sm text-slate-400 text-center mt-5 font-medium tracking-wide">Nog <span className="font-bold text-amber-400">{formatCurrency(goal.amount - totalSales)}</span> te gaan voor Club Gold!</div>
                                    )}
                                    {totalSales >= goal.amount && goal.amount > 0 && (
                                        <div className="text-xs sm:text-sm text-amber-400 text-center mt-5 font-black uppercase tracking-widest animate-pulse flex items-center justify-center gap-2">
                                            <Icons.Crown className="text-xl sm:text-2xl"/> GEFELICITEERD, CLUB GOLD BEHAALD! <Icons.Crown className="text-xl sm:text-2xl"/>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- RECEPTEN MODULE ---
        const RecipesTab = ({ targetUid }) => {
            const [recipes, setRecipes] = useState([]);
            const [input, setInput] = useState({ name: '', product: '', ingredients: '', instructions: '', image: '' });
            const [editingId, setEditingId] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [uploading, setUploading] = useState(false);
            const [viewingRecipe, setViewingRecipe] = useState(null); 

            useEffect(() => {
                if(!targetUid) return;
                const unsub = window.db.collection('users').doc(targetUid).collection('recipes').orderBy('name').onSnapshot(snap => {
                    setRecipes(snap.docs.map(d => ({id: d.id, ...d.data()})));
                });
                return () => unsub();
            }, [targetUid]);

            const handleSave = async () => {
                if(!input.name) return;
                if(editingId) {
                    await window.db.collection('users').doc(targetUid).collection('recipes').doc(editingId).update(input);
                    setEditingId(null);
                } else {
                    await window.db.collection('users').doc(targetUid).collection('recipes').add(input);
                }
                setInput({ name: '', product: '', ingredients: '', instructions: '', image: '' });
            };

            const handleDelete = async (id) => { if(confirm("Recept verwijderen?")) await window.db.collection('users').doc(targetUid).collection('recipes').doc(id).delete(); };

            const handleImageUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setUploading(true);
                try {
                    const ref = firebase.storage().ref().child(`users/${targetUid}/recipes/${Date.now()}_${file.name}`);
                    await ref.put(file);
                    const url = await ref.getDownloadURL();
                    setInput({...input, image: url});
                } catch (error) { alert("Upload fout: " + error.message); } finally { setUploading(false); }
            };

            const filtered = recipes.filter(r => r.name.toLowerCase().includes(searchTerm.toLowerCase()) || (r.product||'').toLowerCase().includes(searchTerm.toLowerCase()));

            const printRecipe = (recipe) => {
                const printWindow = window.open('', '_blank');
                // De backslash voor script is CRUCIAAL hieronder om de browser parser niet te breken
                printWindow.document.write(`
                    <html>
                    <head>
                        <title>${recipe.name}</title>
                        <style>
                            body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; color: #333; }
                            img { max-width: 100%; height: auto; max-height: 400px; border-radius: 8px; margin-bottom: 20px; object-fit: cover; }
                            h1 { color: #059669; border-bottom: 2px solid #059669; padding-bottom: 10px; margin-bottom: 5px; }
                            .product { color: #666; text-transform: uppercase; font-weight: bold; font-size: 0.9em; margin-bottom: 20px; }
                            h2 { color: #059669; margin-top: 25px; font-size: 1.2em; border-bottom: 1px solid #eee; padding-bottom: 5px; }
                            .content { white-space: pre-wrap; line-height: 1.6; }
                            @media print {
                                body { padding: 0; }
                                h1 { color: black; border-color: black; }
                                h2 { color: black; }
                            }
                        </style>
                    </head>
                    <body>
                        <h1>${recipe.name}</h1>
                        <div class="product">${recipe.product || ''}</div>
                        ${recipe.image ? `<img src="${recipe.image}" />` : ''}
                        <h2>Ingrediënten</h2>
                        <div class="content">${recipe.ingredients || '-'}</div>
                        <h2>Bereiding</h2>
                        <div class="content">${recipe.instructions || '-'}</div>
                        <script>
                            window.onload = function() { window.print(); }
                        <\/script>
                    </body>
                    </html>
                `);
                printWindow.document.close();
            };

            return (
                <div className="space-y-6">
                     <div className={`p-4 rounded-xl border shadow-sm transition-colors ${editingId ? 'bg-amber-50 dark:bg-amber-900/20 border-amber-200 dark:border-amber-700' : 'bg-white dark:bg-dark-card border-slate-200 dark:border-slate-700'}`}>
                        <h3 className="font-bold mb-3 flex items-center gap-2 text-slate-700 dark:text-slate-200"><Icons.BookOpen className="text-orange-500"/> {editingId ? 'Recept Wijzigen' : 'Nieuw Recept'}</h3>
                        <div className="grid grid-cols-1 gap-3">
                            <div className="flex gap-3">
                                 <label className="w-24 h-24 border dark:border-slate-600 rounded bg-slate-50 dark:bg-slate-700 flex items-center justify-center cursor-pointer hover:bg-emerald-50 dark:hover:bg-slate-600 shrink-0 relative overflow-hidden">
                                    <input type="file" className="hidden" onChange={handleImageUpload}/>
                                    {uploading ? <Icons.Loader className="text-emerald-600"/> : (input.image ? <img src={input.image} className="w-full h-full object-cover"/> : <div className="text-center text-slate-400 text-[10px]"><Icons.Image className="text-2xl mb-1"/><br/>Foto</div>)}
                                </label>
                                <div className="flex-grow space-y-3">
                                    <input value={input.name} onChange={e=>setInput({...input, name:e.target.value})} placeholder="Recept Naam" className="w-full border dark:border-slate-600 dark:bg-slate-800 dark:text-white p-2 rounded outline-none"/>
                                    <input value={input.product} onChange={e=>setInput({...input, product:e.target.value})} placeholder="Gekoppeld Product (bv. MicroCook)" className="w-full border dark:border-slate-600 dark:bg-slate-800 dark:text-white p-2 rounded outline-none"/>
                                </div>
                            </div>
                            <textarea value={input.ingredients} onChange={e=>setInput({...input, ingredients:e.target.value})} placeholder="Ingrediënten (elk op een nieuwe regel)" className="border dark:border-slate-600 dark:bg-slate-800 dark:text-white p-2 rounded outline-none h-24" />
                            <textarea value={input.instructions} onChange={e=>setInput({...input, instructions:e.target.value})} placeholder="Bereiding..." className="border dark:border-slate-600 dark:bg-slate-800 dark:text-white p-2 rounded outline-none h-24" />
                        </div>
                        <button onClick={handleSave} className={`w-full mt-3 py-2 text-white font-bold rounded shadow-sm ${editingId?'bg-amber-600':'bg-orange-600'}`}>{editingId ? 'Opslaan' : 'Toevoegen'}</button>
                    </div>

                    <div className="bg-white dark:bg-dark-card p-4 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm">
                        <input className="w-full mb-4 p-2 border dark:border-slate-600 dark:bg-slate-800 dark:text-white rounded" placeholder="Zoek recept..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)}/>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            {filtered.map(r => (
                                <div 
                                    key={r.id} 
                                    onClick={() => setViewingRecipe(r)}
                                    className="border dark:border-slate-600 rounded-lg overflow-hidden flex flex-col hover:border-orange-300 dark:hover:border-orange-700 relative group cursor-pointer transition-all hover:shadow-md"
                                >
                                    <div className="h-32 bg-slate-100 dark:bg-slate-700 flex items-center justify-center overflow-hidden border-b dark:border-slate-600">
                                        {r.image ? <img src={r.image} className="w-full h-full object-cover"/> : <Icons.Utensils className="text-slate-300 text-3xl"/>}
                                    </div>
                                    <div className="p-3 flex-grow">
                                        <h4 className="font-bold text-slate-800 dark:text-slate-200">{r.name}</h4>
                                        <div className="text-xs text-orange-600 font-bold mb-2 uppercase">{r.product}</div>
                                        <div className="text-xs text-slate-500 dark:text-slate-400 line-clamp-3 whitespace-pre-line">{r.ingredients}</div>
                                    </div>
                                     <div className="absolute top-2 right-2 flex gap-2" onClick={e => e.stopPropagation()}>
                                        <button onClick={()=>{setInput(r);setEditingId(r.id);window.scrollTo({top:0,behavior:'smooth'})}} className="w-8 h-8 rounded-full bg-white dark:bg-slate-800 flex items-center justify-center text-slate-400 hover:text-amber-500 shadow-sm"><Icons.Edit/></button>
                                        <button onClick={()=>handleDelete(r.id)} className="w-8 h-8 rounded-full bg-white dark:bg-slate-800 flex items-center justify-center text-slate-400 hover:text-red-500 shadow-sm"><Icons.Trash/></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* DETAIL MODAL VOOR RECEPT */}
                    {viewingRecipe && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm" onClick={() => setViewingRecipe(null)}>
                            <div className="bg-white dark:bg-dark-card w-full max-w-2xl max-h-[90vh] rounded-2xl shadow-2xl overflow-hidden flex flex-col animate-in" onClick={e => e.stopPropagation()}>
                                {/* Header */}
                                <div className="p-4 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center bg-slate-50 dark:bg-slate-800">
                                    <div className="min-w-0">
                                        <h3 className="font-bold text-xl text-slate-800 dark:text-slate-100 truncate">{viewingRecipe.name}</h3>
                                        {viewingRecipe.product && <p className="text-xs font-bold text-orange-600 uppercase tracking-wide">{viewingRecipe.product}</p>}
                                    </div>
                                    <div className="flex gap-2 shrink-0">
                                        <button onClick={() => printRecipe(viewingRecipe)} className="w-9 h-9 rounded-full bg-white dark:bg-slate-700 flex items-center justify-center text-slate-500 hover:text-emerald-600 hover:bg-emerald-50 transition-colors" title="Printen"><Icons.Printer className="w-5 h-5"/></button>
                                        <button onClick={() => setViewingRecipe(null)} className="w-9 h-9 rounded-full bg-white dark:bg-slate-700 flex items-center justify-center text-slate-500 hover:text-red-600 hover:bg-red-50 transition-colors"><Icons.X className="w-5 h-5"/></button>
                                    </div>
                                </div>
                                
                                {/* Content */}
                                <div className="overflow-y-auto p-0">
                                    {viewingRecipe.image && (
                                        <div className="w-full h-64 sm:h-80 bg-slate-100 dark:bg-slate-900 flex items-center justify-center overflow-hidden">
                                            <img src={viewingRecipe.image} className="w-full h-full object-cover"/>
                                        </div>
                                    )}
                                    <div className="p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div className="md:col-span-1">
                                            <h4 className="font-bold text-emerald-700 dark:text-emerald-400 mb-3 border-b dark:border-slate-700 pb-1">Ingrediënten</h4>
                                            <div className="text-sm text-slate-600 dark:text-slate-300 whitespace-pre-line leading-relaxed">{viewingRecipe.ingredients || 'Geen ingrediënten opgegeven.'}</div>
                                        </div>
                                        <div className="md:col-span-2">
                                            <h4 className="font-bold text-emerald-700 dark:text-emerald-400 mb-3 border-b dark:border-slate-700 pb-1">Bereiding</h4>
                                            <div className="text-sm text-slate-600 dark:text-slate-300 whitespace-pre-line leading-relaxed">{viewingRecipe.instructions || 'Geen bereidingswijze opgegeven.'}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- STOCK COMPONENT ---
        const StockTab = ({ targetUid, user }) => {
            const [items, setItems] = useState([]);
            const [categories, setCategories] = useState([{ name: 'Algemeen', color: CATEGORY_COLORS[16] }]); 
            const [locations, setLocations] = useState([{ name: 'Algemeen', color: CATEGORY_COLORS[16] }]); 
            const [newItem, setNewItem] = useState({ name: '', category: 'Algemeen', location: 'Algemeen', quantity: 1, price: 0, status: 'zolder', image: '', vinted: 0 });
            const [loading, setLoading] = useState(true);
            const [editingId, setEditingId] = useState(null); 
            const [keepSettings, setKeepSettings] = useState(false); 
            
            // Managers
            const [showCatManager, setShowCatManager] = useState(false);
            const [showLocManager, setShowLocManager] = useState(false);
            const [editName, setEditName] = useState('');
            const [editColor, setEditColor] = useState(0);
            const [editingItemIndex, setEditingItemIndex] = useState(null);
            const [editingItemType, setEditingItemType] = useState(null);

            const [previewImage, setPreviewImage] = useState(null);
            const [uploading, setUploading] = useState(false);
            
            // Filters & Pagination
            const [searchTerm, setSearchTerm] = useState('');
            const [filterCategory, setFilterCategory] = useState('Alles');
            const [filterStatus, setFilterStatus] = useState('Alles');
            const [filterLocation, setFilterLocation] = useState('Alles');
            const [filterVintedOnly, setFilterVintedOnly] = useState(false); // NIEUWE FILTER
            const [sortBy, setSortBy] = useState('name');
            const [currentPage, setCurrentPage] = useState(1);
            const [itemsPerPage, setItemsPerPage] = useState(10); 

            useEffect(() => {
                if(!targetUid) return;
                const unsubStock = window.db.collection('users').doc(targetUid).collection('stock').orderBy('createdAt', 'desc').onSnapshot(snap => { setItems(snap.docs.map(d => ({id: d.id, ...d.data()}))); setLoading(false); });
                const unsubCats = window.db.collection('users').doc(targetUid).collection('settings').doc('categories').onSnapshot(doc => { 
                    if(doc.exists && doc.data().list) {
                        setCategories(doc.data().list.map(c => typeof c === 'string' ? {name:c, color: CATEGORY_COLORS[16]} : c)); 
                    }
                });
                const unsubLocs = window.db.collection('users').doc(targetUid).collection('settings').doc('locations').onSnapshot(doc => { 
                    if(doc.exists && doc.data().list) {
                        setLocations(doc.data().list.map(l => typeof l === 'string' ? {name:l, color: CATEGORY_COLORS[16]} : l)); 
                    }
                });
                return () => { unsubStock(); unsubCats(); unsubLocs(); };
            }, [targetUid]);

            useEffect(() => {
                setCurrentPage(1);
            }, [searchTerm, filterCategory, filterStatus, filterLocation, sortBy, filterVintedOnly]);

            const handleSaveItem = async () => {
                if(!newItem.name) return;
                const itemData = { ...newItem, price: Number(newItem.price)||0, quantity: Number(newItem.quantity)||0, vinted: Number(newItem.vinted)||0, updatedAt: Date.now() };
                try {
                    if (editingId) { 
                        await window.db.collection('users').doc(targetUid).collection('stock').doc(editingId).update(itemData); 
                        setEditingId(null); 
                        setNewItem({ name: '', category: 'Algemeen', location: 'Algemeen', quantity: 1, price: 0, status: 'zolder', image: '', vinted: 0 });
                    } 
                    else { 
                        itemData.createdAt = Date.now(); 
                        await window.db.collection('users').doc(targetUid).collection('stock').add(itemData); 
                        if (keepSettings) {
                            setNewItem(prev => ({ ...prev, name: '', quantity: 1, price: 0, image: '', vinted: 0 }));
                        } else {
                            setNewItem({ name: '', category: 'Algemeen', location: 'Algemeen', quantity: 1, price: 0, status: 'zolder', image: '', vinted: 0 });
                        }
                    }
                } catch(err) { alert("Fout: " + err.message); }
            };

            const deleteItem = async (id) => { if(confirm("Verwijderen?")) await window.db.collection('users').doc(targetUid).collection('stock').doc(id).delete(); };
            const updateQuantity = async (id, current, change) => { if(current+change >= 0) await window.db.collection('users').doc(targetUid).collection('stock').doc(id).update({ quantity: current+change }); };
            
            const handleImageUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setUploading(true);
                try {
                    const ref = firebase.storage().ref().child(`users/${user.uid}/stock/${Date.now()}_${file.name}`);
                    await ref.put(file);
                    const url = await ref.getDownloadURL();
                    setNewItem({...newItem, image: url});
                } catch (error) { alert("Upload fout: " + error.message); } finally { setUploading(false); }
            };

            const openManager = (type) => {
                setEditingItemType(type);
                setEditingItemIndex(null); 
                setEditName('');
                setEditColor(0);
                if (type === 'category') setShowCatManager(true);
                if (type === 'location') setShowLocManager(true);
            };

            const saveConfig = async (type) => {
                if(!editName.trim()) return;
                const list = type === 'cat' ? [...categories] : [...locations];
                const newObj = { name: editName.trim(), color: CATEGORY_COLORS[editColor] };
                if(editingItemIndex !== null) list[editingItemIndex] = newObj; else list.push(newObj);
                await window.db.collection('users').doc(targetUid).collection('settings').doc(type === 'cat' ? 'categories' : 'locations').set({ list }, { merge: true });
                setEditName(''); setEditingItemIndex(null);
            };

            const startEditConfig = (type, index, item) => {
                setEditingItemType(type);
                setEditingItemIndex(index);
                setEditName(item.name);
                const colorIndex = CATEGORY_COLORS.findIndex(c => c.bg === item.color.bg);
                setEditColor(colorIndex !== -1 ? colorIndex : 16);
            };

            const deleteConfig = async (type, index) => {
                if(!confirm("Verwijderen?")) return;
                const list = (type === 'cat' ? categories : locations).filter((_, i) => i !== index);
                await window.db.collection('users').doc(targetUid).collection('settings').doc(type === 'cat' ? 'categories' : 'locations').set({ list }, { merge: true });
            };

            const filteredItems = items.filter(item => {
                return (item.name.toLowerCase().includes(searchTerm.toLowerCase()) || (item.location||'').toLowerCase().includes(searchTerm.toLowerCase())) &&
                       (filterCategory === 'Alles' || item.category === filterCategory) &&
                       (filterStatus === 'Alles' || item.status === filterStatus) &&
                       (filterLocation === 'Alles' || item.location === filterLocation) &&
                       (!filterVintedOnly || (item.vinted && Number(item.vinted) > 0)); // Filter specifiek op Vinted > 0
            }).sort((a,b) => {
                if(sortBy==='name') return a.name.localeCompare(b.name);
                if(sortBy==='price-desc') return b.price - a.price;
                if(sortBy==='price-asc') return a.price - b.price;
                if(sortBy==='qty-desc') return b.quantity - a.quantity;
                if(sortBy==='qty-asc') return a.quantity - b.quantity;
                if(sortBy==='vinted-desc') return (Number(b.vinted)||0) - (Number(a.vinted)||0); // Veiligere sortering
                if(sortBy==='vinted-asc') return (Number(a.vinted)||0) - (Number(b.vinted)||0); // Veiligere sortering
                return 0;
            });

            // Totaal Berekening
            const totalStockValue = filteredItems.reduce((sum, item) => sum + ((item.price || 0) * (item.quantity || 1)), 0);
            const totalStockCount = filteredItems.reduce((sum, item) => sum + (item.quantity || 1), 0);

            // PAGINERING LOGICA
            const totalItems = filteredItems.length;
            const totalPages = itemsPerPage === 'All' ? 1 : Math.ceil(totalItems / itemsPerPage);
            const displayedItems = itemsPerPage === 'All' ? filteredItems : filteredItems.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);

            // Helpers voor kleuren
            const getCategoryColor = (catName) => {
                const cat = categories.find(c => c.name === catName);
                return cat ? cat.color : CATEGORY_COLORS[16];
            };
            const getLocationColor = (locName) => {
                const loc = locations.find(l => l.name === locName);
                return loc ? loc.color : CATEGORY_COLORS[16];
            };

            const formatEuro = (n) => new Intl.NumberFormat('nl-NL', { style: 'currency', currency: 'EUR' }).format(n || 0);
            
            if (loading) return <div className="text-center p-8"><Icons.Loader className="text-2xl text-emerald-600"/></div>;

            return (
                <div className="space-y-6">
                    {/* INPUT CARD */}
                    <div className={`p-5 rounded-xl shadow-sm border transition-colors ${editingId ? 'bg-amber-50 dark:bg-amber-900/20 border-amber-200 dark:border-amber-700' : 'bg-white dark:bg-dark-card border-emerald-100 dark:border-dark-border'}`}>
                        <div className="flex justify-between items-center mb-4">
                            <h3 className={`font-bold flex items-center gap-2 ${editingId ? 'text-amber-800 dark:text-amber-400' : 'text-emerald-900 dark:text-emerald-400'}`}>
                                {editingId ? <Icons.Edit/> : <Icons.Package/>} {editingId ? 'Wijzigen' : 'Nieuw Product'}
                            </h3>
                            <div className="flex gap-2 text-xs">
                                <button onClick={()=>openManager('category')} className="text-emerald-600 dark:text-emerald-400 hover:underline flex items-center gap-1"><Icons.Settings className="w-3"/> Categorieën</button>
                                <span className="text-slate-300 dark:text-slate-600">|</span>
                                <button onClick={()=>openManager('location')} className="text-emerald-600 dark:text-emerald-400 hover:underline flex items-center gap-1"><Icons.Settings className="w-3"/> Locaties</button>
                            </div>
                        </div>

                        {(showCatManager || showLocManager) && (
                            <div className="mb-4 p-3 bg-slate-50 dark:bg-slate-700/50 rounded border border-slate-200 dark:border-slate-600 text-sm animate-in">
                                <div className="flex justify-between mb-2"><span className="font-bold text-slate-600 dark:text-slate-300">Beheer {showCatManager ? 'Categorieën' : 'Locaties'}</span> <button onClick={()=>{setShowCatManager(false);setShowLocManager(false)}}><Icons.X className="dark:text-slate-400"/></button></div>
                                <div className="flex gap-2 mb-2">
                                    <input value={editName} onChange={e=>setEditName(e.target.value)} className="border dark:border-slate-600 dark:bg-slate-800 dark:text-white p-1.5 rounded flex-grow outline-none" placeholder="Naam..."/>
                                    <button onClick={()=>saveConfig(showCatManager?'cat':'loc')} className="bg-emerald-600 text-white px-3 rounded font-bold">OK</button>
                                </div>
                                <div className="flex gap-1 mb-2 flex-wrap">{CATEGORY_COLORS.map((c,i)=><button key={i} onClick={()=>setEditColor(i)} className={`w-6 h-6 rounded-full border-2 ${c.bg} ${editColor===i?'border-emerald-600 ring-2 ring-emerald-200':'border-transparent'}`} title={c.name}></button>)}</div>
                                <div className="max-h-32 overflow-y-auto space-y-1">
                                    {(showCatManager?categories:locations).map((it, idx) => (
                                        <div key={idx} className="flex justify-between items-center bg-white dark:bg-slate-800 p-1.5 rounded border dark:border-slate-600">
                                            <span className="flex items-center gap-2 text-slate-800 dark:text-slate-200"><span className={`w-3 h-3 rounded-full ${it.color.bg}`}></span>{it.name}</span>
                                            <div className="flex gap-2 text-slate-400"><button onClick={()=>{startEditConfig(showCatManager?'category':'location', idx, it)}}><Icons.Edit/></button><button onClick={()=>deleteConfig(showCatManager?'cat':'loc', idx)}><Icons.Trash/></button></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3">
                            <div className="col-span-1 md:col-span-2"><label className="text-xs font-bold text-slate-400 uppercase">Naam</label><input value={newItem.name} onChange={e=>setNewItem({...newItem, name:e.target.value})} className="w-full border dark:border-slate-600 dark:bg-dark-input dark:text-white p-2 rounded outline-none focus:border-emerald-500" placeholder="Productnaam"/></div>
                            <div><label className="text-xs font-bold text-slate-400 uppercase">Categorie</label><select value={newItem.category} onChange={e=>setNewItem({...newItem, category:e.target.value})} className="w-full border dark:border-slate-600 dark:bg-dark-input dark:text-white p-2 rounded outline-none">{categories.map((c,i)=><option key={i} value={c.name}>{c.name}</option>)}</select></div>
                            <div><label className="text-xs font-bold text-slate-400 uppercase">Locatie</label><select value={newItem.location} onChange={e=>setNewItem({...newItem, location:e.target.value})} className="w-full border dark:border-slate-600 dark:bg-dark-input dark:text-white p-2 rounded outline-none">{locations.map((l,i)=><option key={i} value={l.name}>{l.name}</option>)}</select></div>
                            <div><label className="text-xs font-bold text-slate-400 uppercase">Prijs (€)</label>
                                <input 
                                    type="text" 
                                    inputMode="decimal"
                                    value={newItem.price} 
                                    onChange={e=>{
                                        const val = e.target.value.replace(',', '.');
                                        if (/^\d*\.?\d*$/.test(val)) setNewItem({...newItem, price:val});
                                    }} 
                                    className="w-full border dark:border-slate-600 dark:bg-dark-input dark:text-white p-2 rounded outline-none"
                                />
                            </div>
                            <div><label className="text-xs font-bold text-slate-400 uppercase">Aantal</label><input type="number" value={newItem.quantity} onChange={e=>setNewItem({...newItem, quantity:e.target.value})} className="w-full border dark:border-slate-600 dark:bg-dark-input dark:text-white p-2 rounded outline-none"/></div>
                            <div><label className="text-xs font-bold text-slate-400 uppercase">Op Vinted</label><input type="number" value={newItem.vinted} onChange={e=>setNewItem({...newItem, vinted:e.target.value})} className="w-full border dark:border-slate-600 dark:bg-dark-input dark:text-white p-2 rounded outline-none" placeholder="0"/></div>
                            <div className="col-span-1 md:col-span-2">
                                <label className="text-xs font-bold text-slate-400 uppercase">Status & Foto</label>
                                <div className="flex gap-2">
                                    <div className="flex bg-slate-100 dark:bg-slate-700 rounded p-1 flex-grow h-10">
                                        <button onClick={()=>setNewItem({...newItem, status:'zolder'})} className={`flex-1 rounded text-xs font-bold transition-all ${newItem.status==='zolder'?'bg-white dark:bg-slate-600 shadow text-slate-800 dark:text-white':'text-slate-400'}`}>📦 Zolder</button>
                                        <button onClick={()=>setNewItem({...newItem, status:'gebruik'})} className={`flex-1 rounded text-xs font-bold transition-all ${newItem.status==='gebruik'?'bg-white dark:bg-slate-600 shadow text-emerald-600 dark:text-emerald-400':'text-slate-400'}`}>🏠 Gebruik</button>
                                    </div>
                                    <div className="flex flex-col gap-1 w-1/2">
                                        <label className="h-10 px-3 bg-white dark:bg-dark-input border dark:border-slate-600 rounded cursor-pointer flex items-center justify-center hover:bg-emerald-50 dark:hover:bg-slate-600 text-xs text-slate-500 dark:text-slate-300">
                                            <input type="file" className="hidden" onChange={handleImageUpload}/>
                                            {uploading ? <Icons.Loader/> : <span>Uploaden</span>}
                                        </label>
                                    </div>
                                </div>
                                <input type="text" placeholder="Of plak afbeeldingslink..." value={newItem.image} onChange={(e)=>setNewItem({...newItem, image: e.target.value})} className="w-full mt-2 px-2 py-2 text-xs border dark:border-slate-600 dark:bg-dark-input dark:text-white rounded outline-none"/>
                            </div>
                        </div>

                        {!editingId && (
                            <div className="flex items-center gap-2 mt-3 cursor-pointer select-none" onClick={()=>setKeepSettings(!keepSettings)}>
                                <div className={`w-10 h-5 rounded-full relative transition-colors ${keepSettings ? 'bg-emerald-600' : 'bg-slate-300 dark:bg-slate-600'}`}>
                                    <div className={`absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full transition-transform shadow-sm ${keepSettings ? 'translate-x-5' : ''}`}></div>
                                </div>
                                <span className="text-xs text-slate-500 dark:text-slate-400 font-bold">Onthoud categorie & locatie voor volgend product</span>
                            </div>
                        )}

                        <button onClick={handleSaveItem} className={`w-full mt-3 py-2 text-white font-bold rounded shadow-sm ${editingId?'bg-amber-600 hover:bg-amber-700':'bg-emerald-600 hover:bg-emerald-700'}`}>{editingId ? 'Opslaan' : 'Toevoegen'}</button>
                    </div>

                    {/* LIJST */}
                    <div className="bg-white dark:bg-dark-card p-3 rounded-xl border border-slate-200 dark:border-dark-border shadow-sm space-y-3">
                        <div className="relative">
                            <input className="w-full pl-10 pr-4 py-2 rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-dark-input dark:text-white outline-none focus:bg-white dark:focus:bg-slate-800 focus:border-emerald-500 transition-colors" placeholder="Zoek op naam, bak of categorie..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)}/>
                            <div className="absolute left-3 top-2.5 text-slate-400"><Icons.Search/></div>
                        </div>

                        {/* FILTERS RIJ */}
                        <div className="flex flex-wrap gap-2">
                            <select value={filterCategory} onChange={e=>setFilterCategory(e.target.value)} className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 dark:border-slate-600 bg-white dark:bg-dark-input dark:text-white text-slate-600 outline-none focus:border-emerald-500">
                                <option value="Alles">Alle Categorieën</option>
                                {categories.map((c, i) => <option key={i} value={c.name}>{c.name}</option>)}
                            </select>
                            <select value={filterLocation} onChange={e=>setFilterLocation(e.target.value)} className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 dark:border-slate-600 bg-white dark:bg-dark-input dark:text-white text-slate-600 outline-none focus:border-emerald-500">
                                <option value="Alles">Alle Locaties</option>
                                {locations.map((l, i) => <option key={i} value={l.name}>{l.name}</option>)}
                            </select>
                            <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 dark:border-slate-600 bg-white dark:bg-dark-input dark:text-white text-slate-600 outline-none focus:border-emerald-500">
                                <option value="Alles">Alle Statussen</option>
                                <option value="zolder">📦 Op Zolder</option>
                                <option value="gebruik">🏠 In Gebruik</option>
                            </select>
                            
                            {/* VINTED TOGGLE BUTTON */}
                            <button 
                                onClick={() => setFilterVintedOnly(!filterVintedOnly)} 
                                className={`px-3 py-1.5 text-xs rounded-lg border transition-colors flex items-center gap-2 ${filterVintedOnly ? 'bg-cyan-100 text-cyan-700 border-cyan-300 dark:bg-cyan-900 dark:text-cyan-200' : 'bg-white dark:bg-dark-input text-slate-600 dark:text-slate-300 border-slate-200 dark:border-slate-600 hover:border-cyan-300'}`}
                            >
                                {filterVintedOnly ? <Icons.ToggleOn/> : <Icons.ToggleOff/>} Vinted Only
                            </button>

                            <select value={sortBy} onChange={e=>setSortBy(e.target.value)} className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 dark:border-slate-600 bg-white dark:bg-dark-input dark:text-white text-slate-600 outline-none focus:border-emerald-500 ml-auto">
                                <option value="name">Naam (A-Z)</option>
                                <option value="price-desc">Prijs (Hoog-Laag)</option>
                                <option value="price-asc">Prijs (Laag-Hoog)</option>
                                <option value="qty-desc">Aantal (Hoog-Laag)</option>
                                <option value="qty-asc">Aantal (Laag-Hoog)</option>
                                <option value="vinted-desc">Vinted (Hoog-Laag)</option>
                                <option value="vinted-asc">Vinted (Laag-Hoog)</option>
                            </select>
                            
                            <select value={itemsPerPage} onChange={e=>setItemsPerPage(e.target.value === 'All' ? 'All' : Number(e.target.value))} className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 dark:border-slate-600 bg-white dark:bg-dark-input dark:text-white text-slate-600 outline-none focus:border-emerald-500 ml-auto">
                                <option value={10}>Toon 10</option>
                                <option value={25}>Toon 25</option>
                                <option value={50}>Toon 50</option>
                                <option value="All">Toon Alles</option>
                            </select>
                        </div>
                        
                        {/* TOTAAL BLOK */}
                        <div className="grid grid-cols-2 gap-3 mb-4">
                            <div className="bg-emerald-50 dark:bg-emerald-900/30 border border-emerald-200 dark:border-emerald-800 rounded-xl p-4 flex justify-between items-center shadow-sm">
                                <div>
                                    <p className="text-[10px] sm:text-xs text-emerald-600 dark:text-emerald-400 font-bold uppercase tracking-wider">Waarde</p>
                                    <h2 className="text-lg sm:text-2xl font-bold text-emerald-800 dark:text-emerald-300">{formatEuro(totalStockValue)}</h2>
                                </div>
                                <div className="bg-white dark:bg-emerald-800 p-2 rounded-full shadow-sm text-emerald-600 dark:text-emerald-200">
                                    <Icons.Euro className="w-5 h-5"/>
                                </div>
                            </div>
                            <div className="bg-blue-50 dark:bg-blue-900/30 border border-blue-200 dark:border-blue-800 rounded-xl p-4 flex justify-between items-center shadow-sm">
                                <div>
                                    <p className="text-[10px] sm:text-xs text-blue-600 dark:text-blue-400 font-bold uppercase tracking-wider">Aantal</p>
                                    <h2 className="text-lg sm:text-2xl font-bold text-blue-800 dark:text-blue-300">{totalStockCount} stuks</h2>
                                </div>
                                <div className="bg-white dark:bg-blue-800 p-2 rounded-full shadow-sm text-blue-600 dark:text-blue-200">
                                    <Icons.Hash className="w-5 h-5"/>
                                </div>
                            </div>
                        </div>

                        {/* PRODUCTEN LIJST */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                            {displayedItems.length === 0 ? <p className="text-center text-slate-400 col-span-full py-8">Geen producten gevonden.</p> :
                                displayedItems.map(item => {
                                    const catColor = getCategoryColor(item.category);
                                    const locColor = getLocationColor(item.location);
                                    
                                    return (
                                        <div key={item.id} className="border dark:border-slate-700 rounded-lg p-3 flex gap-3 relative hover:border-emerald-300 dark:hover:border-emerald-700 bg-white dark:bg-dark-card">
                                            <div onClick={()=>setPreviewImage(item.image)} className="w-16 h-16 bg-slate-50 dark:bg-slate-700 rounded flex items-center justify-center overflow-hidden cursor-pointer border dark:border-slate-600 shrink-0">
                                                {item.image ? <img src={item.image} className="w-full h-full object-cover"/> : <Icons.Package className="text-slate-300 dark:text-slate-500 text-2xl"/>}
                                            </div>
                                            <div className="flex-grow min-w-0">
                                                <div className="flex justify-between items-start gap-2">
                                                    <div className="min-w-0 flex-1">
                                                        <span className={`text-[10px] px-1.5 rounded uppercase font-bold ${catColor.bg} ${catColor.text}`}>{item.category}</span>
                                                        <div className="font-bold text-slate-800 dark:text-slate-100 break-words">{item.name}</div>
                                                        
                                                        <div className={`flex items-center gap-1 text-[10px] mt-1 px-1.5 py-0.5 rounded-md w-fit ${locColor.bg} ${locColor.text}`}>
                                                            <Icons.Box className="w-3 h-3"/> 
                                                            <span className="font-bold">{item.location || 'Geen locatie'}</span>
                                                        </div>
                                                        {/* Vinted Badge */}
                                                        {item.vinted > 0 && (
                                                            <div className="flex items-center gap-1 text-[10px] mt-1 px-1.5 py-0.5 rounded-md w-fit bg-cyan-100 text-cyan-700 dark:bg-cyan-900 dark:text-cyan-200 border border-cyan-200 dark:border-cyan-800">
                                                                <Icons.Shirt className="w-3 h-3"/>
                                                                <span className="font-bold">Online op Vinted: {item.vinted}</span>
                                                            </div>
                                                        )}
                                                    </div>
                                                    <div className="text-right flex flex-col items-end shrink-0 ml-2">
                                                        <div className="font-bold text-emerald-700 dark:text-emerald-400">{formatEuro(item.price)}</div>
                                                        {item.quantity > 1 && (
                                                            <span className="text-[10px] text-slate-500 dark:text-slate-400 font-medium block">
                                                                Totaal: {formatEuro((item.price || 0) * item.quantity)}
                                                            </span>
                                                        )}
                                                        <div className={`text-[9px] px-1 rounded uppercase font-bold mt-1 inline-block ${item.status==='zolder'?'bg-slate-100 dark:bg-slate-700 dark:text-slate-300':'bg-orange-50 dark:bg-orange-900/50 text-orange-600 dark:text-orange-300'}`}>{item.status}</div>
                                                    </div>
                                                </div>
                                                <div className="flex justify-between items-center mt-2 border-t dark:border-slate-700 pt-2 border-slate-50">
                                                    <div className="flex items-center border dark:border-slate-600 rounded bg-slate-50 dark:bg-slate-700">
                                                        <button onClick={()=>updateQuantity(item.id,item.quantity,-1)} className="px-2 hover:bg-slate-200 dark:hover:bg-slate-600 dark:text-slate-200">-</button>
                                                        <span className="px-2 font-mono font-bold text-sm bg-white dark:bg-slate-800 dark:text-white">{item.quantity}</span>
                                                        <button onClick={()=>updateQuantity(item.id,item.quantity,1)} className="px-2 hover:bg-slate-200 dark:hover:bg-slate-600 dark:text-slate-200">+</button>
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <button onClick={()=>{setNewItem(item);setEditingId(item.id);window.scrollTo({top:0,behavior:'smooth'})}} className="text-slate-400 hover:text-amber-500 dark:hover:text-amber-400"><Icons.Edit/></button>
                                                        <button onClick={()=>deleteItem(item.id)} className="text-slate-400 hover:text-red-500 dark:hover:text-red-400"><Icons.Trash/></button>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )
                                })
                            }
                        </div>

                        {/* PAGINERING CONTROLS */}
                        {totalPages > 1 && (
                            <div className="flex justify-center items-center gap-4 mt-4 py-2 border-t border-slate-100 dark:border-slate-700">
                                <button 
                                    onClick={() => setCurrentPage(prev => Math.max(1, prev - 1))}
                                    disabled={currentPage === 1}
                                    className={`px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 ${currentPage === 1 ? 'text-slate-300 dark:text-slate-600 cursor-not-allowed' : 'text-emerald-600 dark:text-emerald-400 hover:bg-emerald-50 dark:hover:bg-emerald-900/30'}`}
                                >
                                    <Icons.ChevronLeft/> Vorige
                                </button>
                                <span className="text-sm font-medium text-slate-500 dark:text-slate-400">Pagina {currentPage} van {totalPages}</span>
                                <button 
                                    onClick={() => setCurrentPage(prev => Math.min(totalPages, prev + 1))}
                                    disabled={currentPage === totalPages}
                                    className={`px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 ${currentPage === totalPages ? 'text-slate-300 dark:text-slate-600 cursor-not-allowed' : 'text-emerald-600 dark:text-emerald-400 hover:bg-emerald-50 dark:hover:bg-emerald-900/30'}`}
                                >
                                    Volgende <Icons.ChevronRight/>
                                </button>
                            </div>
                        )}
                    </div>
                    {previewImage && <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4" onClick={()=>setPreviewImage(null)}><img src={previewImage} className="max-w-full max-h-[80vh] rounded"/></div>}
                </div>
            );
        };

        // --- WENSEN COMPONENT ---
        const RequestsTab = ({ targetUid }) => {
            const [list, setList] = useState([]);
            const [input, setInput] = useState({customer:'', product:'', note:'', image: '', email: '', phone: ''});
            const [uploading, setUploading] = useState(false);
            const [previewImage, setPreviewImage] = useState(null);
            const [editingId, setEditingId] = useState(null); 
            
            useEffect(() => {
                if(!targetUid) return;
                const unsub = window.db.collection('users').doc(targetUid).collection('requests').orderBy('createdAt','desc').onSnapshot(s => setList(s.docs.map(d=>({id:d.id,...d.data()}))));
                return () => unsub();
            }, [targetUid]);

            const handleSave = async () => { 
                if(input.customer && input.product) { 
                    if(editingId) {
                        await window.db.collection('users').doc(targetUid).collection('requests').doc(editingId).update(input);
                        setEditingId(null);
                    } else {
                        await window.db.collection('users').doc(targetUid).collection('requests').add({...input, completed:false, createdAt:Date.now()}); 
                    }
                    setInput({customer:'',product:'',note:'', image: '', email: '', phone: ''}); 
                }
            };
            
            const handleEdit = (item) => {
                setInput({ customer: item.customer, product: item.product, note: item.note || '', image: item.image || '', email: item.email || '', phone: item.phone || '' });
                setEditingId(item.id);
                window.scrollTo({top:0, behavior:'smooth'});
            };

            const handleImageUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setUploading(true);
                try {
                    const ref = firebase.storage().ref().child(`users/${targetUid}/requests/${Date.now()}_${file.name}`);
                    await ref.put(file);
                    const url = await ref.getDownloadURL();
                    setInput({...input, image: url});
                } catch (error) { alert("Upload fout: " + error.message); } finally { setUploading(false); }
            };

            const toggle = async (item) => window.db.collection('users').doc(targetUid).collection('requests').doc(item.id).update({completed:!item.completed});
            const del = async (id) => { if(confirm("Verwijderen?")) window.db.collection('users').doc(targetUid).collection('requests').doc(id).delete(); };

            const activeRequests = list.filter(item => !item.completed);
            const completedRequests = list.filter(item => item.completed);

            return (
                <div className="space-y-6">
                    {/* INVULFORMULIER */}
                    <div className={`p-4 rounded-xl border shadow-sm transition-colors ${editingId ? 'bg-amber-50 dark:bg-amber-900/20 border-amber-200 dark:border-amber-700' : 'bg-white dark:bg-dark-card border-emerald-100 dark:border-dark-border'}`}>
                        <h3 className={`font-bold mb-2 flex items-center gap-2 ${editingId ? 'text-amber-800 dark:text-amber-400' : 'text-emerald-800 dark:text-emerald-400'}`}>
                            {editingId ? <Icons.Edit/> : <Icons.Plus/>} {editingId ? 'Wens Wijzigen' : 'Nieuwe Wens'}
                        </h3>
                        <div className="flex flex-col gap-2">
                            <div className="flex gap-2">
                                <label className="w-20 h-20 border dark:border-slate-600 rounded bg-slate-50 dark:bg-slate-700 flex items-center justify-center cursor-pointer hover:bg-emerald-50 dark:hover:bg-slate-600 shrink-0 relative overflow-hidden">
                                    <input type="file" className="hidden" onChange={handleImageUpload}/>
