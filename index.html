<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inloggen - Tupperware Tracker</title>
    
    <!-- 1. Stijlen -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 2. React (De motor) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- 3. Babel (De vertaler) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 4. Icoontjes -->
    <script src="https://unpkg.com/lucide-react@0.344.0/dist/umd/lucide-react.js"></script>

    <!-- 5. Firebase (De database) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <!-- 6. JOUW EIGEN BESTAND (Zorg dat deze in dezelfde map staat!) -->
    <script src="firebase-setup.js"></script>

    <style>
        .loading-text { font-family: sans-serif; text-align: center; margin-top: 50px; color: #666; }
        .error-box { background: #fee2e2; color: #991b1b; padding: 20px; margin: 20px; border-radius: 8px; border: 1px solid #f87171; font-family: sans-serif; display: none; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <!-- Loading Scherm -->
    <div id="root">
        <div class="loading-text">
            <h1>De app wordt geladen...</h1>
            <p>Blijft dit staan? Dan is er iets mis met de installatie.</p>
        </div>
    </div>

    <!-- Error Box -->
    <div id="script-error" class="error-box">
        <h2 style="font-weight: bold; margin-bottom: 10px;">⚠️ STOP! Er is een probleem:</h2>
        <ul id="error-list" style="list-style-type: disc; padding-left: 20px;"></ul>
        <p style="margin-top: 10px; font-size: 0.9em;">Controleer of je internet hebt en of <strong>firebase-setup.js</strong> in dezelfde map staat.</p>
    </div>

    <!-- Scripts Checker -->
    <script>
        window.onload = function() {
            var errors = [];
            if (typeof React === 'undefined') errors.push("React kon niet geladen worden (Check internet).");
            if (typeof ReactDOM === 'undefined') errors.push("ReactDOM kon niet geladen worden.");
            if (typeof Babel === 'undefined') errors.push("Babel kon niet geladen worden.");
            if (typeof firebase === 'undefined') errors.push("Firebase kon niet geladen worden.");
            if (typeof firebase !== 'undefined' && !window.auth) {
                errors.push("Het bestand <strong>firebase-setup.js</strong> wordt niet gevonden of bevat een fout.");
            }

            if (errors.length > 0) {
                var list = document.getElementById('error-list');
                errors.forEach(function(err) {
                    var li = document.createElement('li');
                    li.innerHTML = err;
                    list.appendChild(li);
                });
                document.getElementById('script-error').style.display = 'block';
                document.getElementById('root').style.display = 'none';
            }
        };
    </script>

    <!-- DE ECHTE APP -->
    <script type="text/babel">
        const { useState, useEffect } = React;
        const LucideIcons = window.lucideReact || window.lucide || {};
        const { LogIn, Loader2 } = LucideIcons;

        function LoginPage() {
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                if (!window.auth) {
                    setLoading(false);
                    return;
                }

                const unsubscribe = window.auth.onAuthStateChanged((user) => {
                    if (user) {
                        window.location.href = 'dashboard.html';
                    } else {
                        setLoading(false);
                    }
                });
                return () => unsubscribe();
            }, []);

            const handleGoogleLogin = async () => {
                try {
                    setError('');
                    await window.auth.signInWithPopup(window.googleProvider);
                } catch (err) {
                    console.error("Login Error:", err);
                    if (window.location.protocol === 'file:') {
                        setError("Google Inloggen werkt niet direct vanuit een map. Zet de bestanden op GitHub of gebruik een lokale server.");
                    } else {
                        setError("Inloggen mislukt: " + err.message);
                    }
                }
            };

            if (loading) {
                return (
                    <div className="h-screen flex items-center justify-center text-emerald-600">
                        {Loader2 ? <Loader2 className="w-10 h-10 animate-spin" /> : "Laden..."}
                    </div>
                );
            }

            return (
                <div className="flex flex-col items-center justify-center min-h-screen text-center px-4">
                    <div className="bg-white p-8 rounded-2xl shadow-lg border border-emerald-100 max-w-sm w-full animate-in">
                        
                        {/* LOGO GEDEELTE */}
                        <div className="flex justify-center mb-6">
                            {/* Zorg dat je foto 'logonieuw.png' heet en in dezelfde map staat! */}
                            <img 
                                src="logonieuw.png" 
                                alt="Tupperware Logo" 
                                className="h-48 w-auto object-contain" 
                                onError={(e) => {
                                    e.target.style.display = 'none'; // Verberg als foto niet bestaat
                                    // Fallback tekst als foto mist
                                    e.target.parentNode.innerHTML = '<div class="text-emerald-600 font-bold p-4 bg-emerald-50 rounded-full">LOGO</div>';
                                }}
                            />
                        </div>
                        
                        <h2 className="text-2xl font-bold text-emerald-700 mb-2">Tupperware Tracker</h2>
                        <p className="text-slate-500 mb-6">Welkom! Log in om verder te gaan.</p>
                        
                        {error && (
                            <div className="mb-4 p-3 bg-red-50 border border-red-200 text-red-600 rounded-lg text-sm text-left">
                                {error}
                            </div>
                        )}

                        <button 
                            onClick={handleGoogleLogin} 
                            className="w-full flex items-center justify-center gap-3 bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-xl font-semibold transition-all shadow-md hover:shadow-lg active:scale-95"
                        >
                            {LogIn && <LogIn className="w-5 h-5" />}
                            <span>Inloggen met Google</span>
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LoginPage />);
    </script>
</body>
</html>
