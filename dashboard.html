                                    {uploading ? <Icons.Loader className="text-emerald-600"/> : (input.image ? <img src={input.image} className="w-full h-full object-cover"/> : <div className="text-center text-slate-400 text-[10px]"><Icons.Image className="text-xl mb-1"/><br/>Foto</div>)}
                                </label>
                                <div className="flex flex-col gap-2 flex-grow">
                                    <input value={input.customer} onChange={e=>setInput({...input, customer:e.target.value})} placeholder="Klant naam" className="border dark:border-slate-600 dark:bg-dark-input dark:text-white p-2 rounded text-sm w-full outline-none"/>
                                    <input value={input.product} onChange={e=>setInput({...input, product:e.target.value})} placeholder="Product" className="border dark:border-slate-600 dark:bg-dark-input dark:text-white p-2 rounded text-sm w-full outline-none"/>
                                    <div className="flex gap-2">
                                        <input value={input.email} onChange={e=>setInput({...input, email:e.target.value})} placeholder="Email (optioneel)" className="border dark:border-slate-600 dark:bg-dark-input dark:text-white p-2 rounded text-sm w-full outline-none"/>
                                        <input value={input.phone} onChange={e=>setInput({...input, phone:e.target.value})} placeholder="Telefoon (optioneel)" className="border dark:border-slate-600 dark:bg-dark-input dark:text-white p-2 rounded text-sm w-full outline-none"/>
                                    </div>
                                </div>
                            </div>
                            <input value={input.image} onChange={e=>setInput({...input, image:e.target.value})} placeholder="Of plak afbeeldingslink..." className="border dark:border-slate-600 dark:bg-dark-input dark:text-slate-300 p-1.5 rounded text-xs w-full text-slate-500 outline-none"/>
                            <input value={input.note} onChange={e=>setInput({...input, note:e.target.value})} placeholder="Notitie (optioneel)" className="border dark:border-slate-600 dark:bg-dark-input dark:text-white p-2 rounded text-sm w-full outline-none"/>
                        </div>
                        <button onClick={handleSave} className={`w-full mt-2 text-white py-2 rounded font-bold shadow-sm ${editingId ? 'bg-amber-600 hover:bg-amber-700' : 'bg-emerald-600 hover:bg-emerald-700'}`}>
                            {editingId ? 'Wijziging Opslaan' : 'Toevoegen'}
                        </button>
                    </div>

                    {/* NOG TE ZOEKEN LIJST */}
                    <div>
                        <h4 className="font-bold text-slate-600 dark:text-slate-300 mb-2 flex items-center gap-2 text-sm uppercase tracking-wide"><Icons.Search/> Nog te zoeken</h4>
                        <div className="space-y-2">
                            {activeRequests.length===0 && <p className="text-center text-slate-400 py-4 italic text-sm border-2 border-dashed dark:border-slate-700 rounded-lg">Geen openstaande wensen.</p>}
                            {activeRequests.map(item => (
                                <div key={item.id} className="p-3 rounded-lg border bg-white dark:bg-dark-card border-slate-200 dark:border-slate-700 flex gap-3 items-center shadow-sm">
                                    <div onClick={()=>item.image && setPreviewImage(item.image)} className={`w-12 h-12 rounded shrink-0 overflow-hidden flex items-center justify-center border border-slate-200 dark:border-slate-600 ${item.image ? 'cursor-pointer bg-white' : 'bg-slate-50 dark:bg-slate-800'}`}>
                                         {item.image ? <img src={item.image} className="w-full h-full object-cover"/> : <Icons.Gift className="text-slate-300 dark:text-slate-500 text-xl"/>}
                                    </div>
                                    <div className="flex-grow min-w-0">
                                        <div className="font-bold text-slate-800 dark:text-slate-100 truncate">{item.product}</div>
                                        <div className="text-xs text-slate-500 dark:text-slate-400 flex flex-wrap gap-x-2 items-center">
                                            <span>Voor: <span className="font-semibold">{item.customer}</span></span>
                                            {item.email && <span className="flex items-center gap-1"><Icons.Envelope className="text-[10px]"/> {item.email}</span>}
                                            {item.phone && <span className="flex items-center gap-1"><Icons.Phone className="text-[10px]"/> {item.phone}</span>}
                                            {item.note && <span className="italic">({item.note})</span>}
                                        </div>
                                    </div>
                                    <div className="flex gap-2 shrink-0">
                                        <button onClick={()=>handleEdit(item)} className="w-8 h-8 rounded-full flex items-center justify-center text-slate-300 dark:text-slate-500 hover:text-amber-500 hover:bg-amber-50 dark:hover:bg-amber-900/30"><Icons.Edit/></button>
                                        <button onClick={()=>toggle(item)} className="w-8 h-8 rounded-full flex items-center justify-center text-slate-300 dark:text-slate-500 bg-slate-100 dark:bg-slate-700 hover:text-emerald-500 hover:bg-emerald-100 dark:hover:bg-emerald-900/30"><Icons.Check/></button>
                                        <button onClick={()=>del(item.id)} className="w-8 h-8 rounded-full flex items-center justify-center text-slate-300 dark:text-slate-500 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30"><Icons.Trash/></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* GEVONDEN LIJST */}
                    {completedRequests.length > 0 && (
                        <div>
                            <h4 className="font-bold text-emerald-600 dark:text-emerald-400 mb-2 flex items-center gap-2 text-sm uppercase tracking-wide mt-6"><Icons.CheckCircle/> Reeds gevonden</h4>
                            <div className="space-y-2 opacity-75">
                                {completedRequests.map(item => (
                                    <div key={item.id} className="p-3 rounded-lg border bg-emerald-50 dark:bg-emerald-900/20 border-emerald-100 dark:border-emerald-800 flex gap-3 items-center">
                                        <div onClick={()=>item.image && setPreviewImage(item.image)} className={`w-12 h-12 rounded shrink-0 overflow-hidden flex items-center justify-center border border-emerald-200 dark:border-emerald-700 ${item.image ? 'cursor-pointer bg-white' : 'bg-white/50 dark:bg-slate-800'}`}>
                                             {item.image ? <img src={item.image} className="w-full h-full object-cover grayscale opacity-70 hover:grayscale-0 hover:opacity-100 transition-all"/> : <Icons.Gift className="text-emerald-300 dark:text-emerald-700 text-xl"/>}
                                        </div>
                                        <div className="flex-grow min-w-0">
                                            <div className="font-bold text-emerald-800 dark:text-emerald-300 line-through truncate">{item.product}</div>
                                            <div className="text-xs text-emerald-600 dark:text-emerald-400">Gevonden voor: {item.customer}</div>
                                        </div>
                                        <div className="flex gap-2 shrink-0">
                                            <button onClick={()=>toggle(item)} className="w-8 h-8 rounded-full flex items-center justify-center text-emerald-600 dark:text-emerald-400 bg-emerald-200 dark:bg-emerald-800 hover:bg-emerald-300 dark:hover:bg-emerald-700" title="Terugzetten naar te zoeken"><Icons.Check/></button>
                                            <button onClick={()=>del(item.id)} className="w-8 h-8 rounded-full flex items-center justify-center text-emerald-400 dark:text-emerald-600 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30"><Icons.Trash/></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {previewImage && <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4" onClick={()=>setPreviewImage(null)}><img src={previewImage} className="max-w-full max-h-[80vh] rounded"/></div>}
                </div>
            );
        };

        // --- PS BEHEER MODAL (ONGWIJZIGD) ---
        const PsManagementModal = ({ isOpen, onClose, psLevels, updatePsLevels, user }) => {
            const [uploadingId, setUploadingId] = useState(null);
            if (!isOpen) return null;
            const addLevel = () => updatePsLevels([...(psLevels||[]), { id: Date.now(), amount: '', name: '', label: '', image: '' }]);
            const updateLevel = (id, field, value) => updatePsLevels(psLevels.map(l => l.id === id ? { ...l, [field]: value } : l));
            const deleteLevel = (id) => { if(confirm("Verwijderen?")) updatePsLevels(psLevels.filter(l => l.id !== id)); };
            const handleImageUpload = async (e, levelId) => {
                const file = e.target.files[0];
                if (!file) return;
                setUploadingId(levelId);
                try {
                    const ref = firebase.storage().ref().child(`users/${user.uid}/ps_images/${Date.now()}_${file.name}`);
                    await ref.put(file);
                    const url = await ref.getDownloadURL();
                    updateLevel(levelId, 'image', url);
                } catch (error) { alert("Upload mislukt: " + error.message); } finally { setUploadingId(null); }
            };
            return (
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 backdrop-blur-sm" onClick={onClose}>
                    <div className="bg-white dark:bg-dark-card rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] flex flex-col modal-content" onClick={e => e.stopPropagation()}>
                        <div className="p-4 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center bg-slate-50 dark:bg-slate-800 rounded-t-2xl"><h3 className="font-bold text-slate-700 dark:text-slate-200 flex items-center gap-2"><Icons.Settings className="text-emerald-600 dark:text-emerald-400"/> Beloningen Beheren</h3><button onClick={onClose}><Icons.X className="dark:text-slate-400"/></button></div>
                        <div className="p-4 overflow-y-auto space-y-4">
                            {(!psLevels || psLevels.length === 0) && <div className="text-center py-8 text-slate-400 border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-xl"><p>Nog geen beloningen ingesteld.</p></div>}
                            {(psLevels||[]).sort((a,b)=>(Number(a.amount)||0)-(Number(b.amount)||0)).map((level, index) => (
                                <div key={level.id} className="bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-3 space-y-3">
                                    <div className="flex justify-between items-center border-b border-slate-200 dark:border-slate-700 pb-2"><span className="text-xs font-bold text-slate-500 uppercase">{level.label || `PS ${index + 1}`}</span><button onClick={() => deleteLevel(level.id)} className="text-red-500 hover:text-red-700 text-xs flex items-center gap-1 font-medium"><Icons.Trash/> Verwijderen</button></div>
                                    <div className="grid grid-cols-1 gap-3">
                                        <div><label className="text-[10px] font-bold text-slate-400 uppercase block mb-1">Label</label><input type="text" placeholder={`PS ${index + 1}`} value={level.label} onChange={(e)=>updateLevel(level.id, 'label', e.target.value)} className="w-full px-2 py-2 text-sm font-bold border dark:border-slate-600 dark:bg-slate-700 dark:text-emerald-400 rounded outline-none text-emerald-700"/></div>
                                        <div><label className="text-[10px] font-bold text-slate-400 uppercase block mb-1">Bedrag (€)</label><input type="number" value={level.amount} onChange={(e)=>updateLevel(level.id, 'amount', e.target.value)} className="w-full px-2 py-2 text-sm font-bold border dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded outline-none"/></div>
                                        <div><label className="text-[10px] font-bold text-slate-400 uppercase block mb-1">Naam</label><input type="text" placeholder="Bijv. Braadpan" value={level.name} onChange={(e)=>updateLevel(level.id, 'name', e.target.value)} className="w-full px-2 py-2 text-sm border dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded outline-none"/></div>
                                    </div>
                                    <div><label className="text-[10px] font-bold text-slate-400 uppercase block mb-1">Afbeelding</label><div className="flex gap-2 items-center"><div className="w-20 h-20 rounded border dark:border-slate-600 bg-white dark:bg-slate-700 flex items-center justify-center overflow-hidden shrink-0 relative">{uploadingId === level.id ? <Icons.Loader className="text-emerald-600"/> : level.image ? <img src={level.image} className="w-full h-full object-cover"/> : <Icons.Image className="text-2xl text-slate-300"/>}</div><div className="flex-grow flex flex-col gap-2"><label className="flex items-center justify-center gap-2 px-3 py-2 bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded cursor-pointer hover:bg-emerald-50 dark:hover:bg-slate-600 w-full"><input type="file" accept="image/*" className="hidden" onChange={(e) => handleImageUpload(e, level.id)}/><Icons.Upload className="text-slate-500"/><span className="text-xs text-slate-600 dark:text-slate-300 font-medium">Upload Foto</span></label><input type="text" placeholder="Of plak link..." value={level.image} onChange={(e)=>updateLevel(level.id, 'image', e.target.value)} className="w-full px-2 py-1.5 text-xs border border-slate-300 dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded outline-none"/></div></div></div>
                                </div>
                            ))}
                            <button onClick={addLevel} className="w-full py-3 border-2 border-dashed border-emerald-200 dark:border-emerald-800 text-emerald-600 dark:text-emerald-400 rounded-xl font-bold hover:bg-emerald-50 dark:hover:bg-emerald-900/20 flex items-center justify-center gap-2"><Icons.Plus/> Nieuw Niveau</button>
                        </div>
                        <div className="p-4 border-t border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 rounded-b-2xl"><button onClick={onClose} className="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl shadow-lg">Klaar & Opslaan</button></div>
                    </div>
                </div>
            );
        };

        // --- USER SELECTOR & SETTINGS MODAL (AANGEPAST) ---
        const AdminUserModal = ({ isOpen, onClose, selectedYear, onSelectUser }) => {
            const [usersList, setUsersList] = useState([]);
            const [loading, setLoading] = useState(true);
            const [editingUserPerms, setEditingUserPerms] = useState(null); // ID van user wiens rechten we bewerken
            const [perms, setPerms] = useState({ showStock: true, showRequests: true, showCustomers: true, showRecipes: true, showClub: true });

            useEffect(() => {
                if (!isOpen) return;
                // Haal gebruikers op uit alle maanden (een simpele manier om actieve gebruikers te vinden)
                const unsub = window.db.collectionGroup('months').where('yearId', '==', selectedYear).onSnapshot(snapshot => {
                    const usersMap = {};
                    snapshot.forEach(doc => {
                        const d = doc.data();
                        if (d.userId && !usersMap[d.userId]) usersMap[d.userId] = { uid: d.userId, name: d.userName || 'Onbekend', email: d.userEmail, photo: d.userPhoto };
                    });
                    setUsersList(Object.values(usersMap));
                    setLoading(false);
                });
                return () => unsub();
            }, [isOpen, selectedYear]);

            // Open permissie beheer paneel voor specifieke user
            const openPermissions = async (e, user) => {
                e.stopPropagation();
                setEditingUserPerms(user.uid);
                // Haal bestaande config op
                const doc = await window.db.collection('users').doc(user.uid).collection('settings').doc('config').get();
                if (doc.exists) setPerms(doc.data());
                else setPerms({ showStock: true, showRequests: true, showCustomers: true, showRecipes: true, showClub: true });
            };

            const togglePerm = async (key) => {
                const newPerms = { ...perms, [key]: !perms[key] };
                setPerms(newPerms);
                await window.db.collection('users').doc(editingUserPerms).collection('settings').doc('config').set(newPerms, { merge: true });
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 backdrop-blur-sm" onClick={onClose}>
                    <div className="bg-white dark:bg-dark-card rounded-2xl shadow-xl w-full max-w-md overflow-hidden modal-content" onClick={e=>e.stopPropagation()}>
                        <div className="p-4 border-b bg-slate-50 dark:bg-slate-800 flex justify-between items-center"><h3 className="font-bold text-slate-700 dark:text-slate-200 flex items-center gap-2"><Icons.Shield className="text-red-500"/> Beheer Gebruikers</h3><button onClick={onClose}><Icons.X className="dark:text-slate-400"/></button></div>
                        <div className="p-4 max-h-[60vh] overflow-y-auto space-y-2">
                            {loading ? <Icons.Loader className="mx-auto block text-emerald-600"/> : usersList.map(u => (
                                <div key={u.uid} className="bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-xl overflow-hidden shadow-sm hover:border-emerald-300 dark:hover:border-emerald-600 transition-all">
                                    <div className="flex items-center gap-3 p-3 cursor-pointer hover:bg-emerald-50 dark:hover:bg-slate-700" onClick={() => onSelectUser(u)}>
                                        <div className="w-10 h-10 rounded-full bg-slate-200 dark:bg-slate-600 overflow-hidden shrink-0">{u.photo?<img src={u.photo} className="w-full h-full object-cover"/>:<Icons.User className="m-2.5 text-slate-400"/>}</div>
                                        <div className="flex-grow">
                                            <div className="font-bold text-slate-800 dark:text-slate-200 text-sm">{u.name}</div>
                                            <div className="text-xs text-slate-400">{u.uid.slice(0,6)}...</div>
                                        </div>
                                        {/* Instellingen knop */}
                                        <button onClick={(e)=>openPermissions(e, u)} className="p-2 text-slate-400 hover:text-emerald-600 hover:bg-white rounded-full transition-colors" title="Rechten Beheren">
                                            <Icons.Settings/>
                                        </button>
                                    </div>
                                    
                                    {/* Permissies Paneel (Inline) */}
                                    {editingUserPerms === u.uid && (
                                        <div className="bg-slate-50 dark:bg-slate-700 border-t dark:border-slate-600 p-3 text-sm animate-in">
                                            <div className="flex justify-between items-center mb-2">
                                                <span className="font-bold text-xs text-slate-500 dark:text-slate-300 uppercase">Opties voor {u.name}</span>
                                                <button onClick={()=>setEditingUserPerms(null)} className="text-slate-400"><Icons.X className="w-3"/></button>
                                            </div>
                                            <div className="flex flex-wrap gap-2">
                                                <button onClick={()=>togglePerm('showStock')} className={`flex items-center gap-2 px-3 py-1.5 rounded border transition-colors ${perms.showStock ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900 dark:text-emerald-200 border-emerald-200 dark:border-emerald-800' : 'bg-white dark:bg-slate-800 text-slate-400 border-slate-200 dark:border-slate-600'}`}>
                                                    {perms.showStock ? <Icons.Unlock className="w-3"/> : <Icons.Lock className="w-3"/>}
                                                    Voorraad
                                                </button>
                                                <button onClick={()=>togglePerm('showRequests')} className={`flex items-center gap-2 px-3 py-1.5 rounded border transition-colors ${perms.showRequests ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900 dark:text-emerald-200 border-emerald-200 dark:border-emerald-800' : 'bg-white dark:bg-slate-800 text-slate-400 border-slate-200 dark:border-slate-600'}`}>
                                                    {perms.showRequests ? <Icons.Unlock className="w-3"/> : <Icons.Lock className="w-3"/>}
                                                    Wensen
                                                </button>
                                                <button onClick={()=>togglePerm('showRecipes')} className={`flex items-center gap-2 px-3 py-1.5 rounded border transition-colors ${perms.showRecipes ? 'bg-orange-100 text-orange-700 dark:bg-orange-900 dark:text-orange-200 border-orange-200 dark:border-orange-800' : 'bg-white dark:bg-slate-800 text-slate-400 border-slate-200 dark:border-slate-600'}`}>
                                                    {perms.showRecipes ? <Icons.Unlock className="w-3"/> : <Icons.Lock className="w-3"/>}
                                                    Recepten
                                                </button>
                                                <button onClick={()=>togglePerm('showCustomers')} className={`flex items-center gap-2 px-3 py-1.5 rounded border transition-colors ${perms.showCustomers ? 'bg-purple-100 text-purple-700 dark:bg-purple-900 dark:text-purple-200 border-purple-200 dark:border-purple-800' : 'bg-white dark:bg-slate-800 text-slate-400 border-slate-200 dark:border-slate-600'}`}>
                                                    {perms.showCustomers ? <Icons.Unlock className="w-3"/> : <Icons.Lock className="w-3"/>}
                                                    Klanten
                                                </button>
                                                <button onClick={()=>togglePerm('showClub')} className={`flex items-center gap-2 px-3 py-1.5 rounded border transition-colors ${perms.showClub ? 'bg-amber-100 text-amber-700 dark:bg-amber-900 dark:text-amber-200 border-amber-200 dark:border-amber-800' : 'bg-white dark:bg-slate-800 text-slate-400 border-slate-200 dark:border-slate-600'}`}>
                                                    {perms.showClub ? <Icons.Unlock className="w-3"/> : <Icons.Lock className="w-3"/>}
                                                    Club/Gold
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // --- SUB-COMPONENT: MAAND RIJ (NU MET KALENDER LOGICA) ---
        const MonthRow = ({ month, monthIndex, year, data, updateMonthData, formatCurrency, user }) => {
            const [expanded, setExpanded] = useState(false);
            const [isModalOpen, setIsModalOpen] = useState(false);
            
            // CHECK OF WE DE KALENDER MOETEN GEBRUIKEN (Vanaf april = index 3)
            const useCalendar = monthIndex >= 3;

            // KALENDER FUNCTIE
            const getMonthWeeks = (y, m) => {
                const weeks = [];
                let currentDate = new Date(y, m, 1);
                const lastDate = new Date(y, m + 1, 0);

                while (currentDate <= lastDate) {
                    let start = new Date(currentDate);
                    let end = new Date(currentDate);
                    
                    let daysUntilSunday = end.getDay() === 0 ? 0 : 7 - end.getDay();
                    end.setDate(end.getDate() + daysUntilSunday);

                    if (end > lastDate) {
                        end = new Date(lastDate);
                    }

                    const formatShortDate = (d) => `${d.getDate()} ${['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'][d.getMonth()]}`;

                    weeks.push({
                        start: new Date(start),
                        end: new Date(end),
                        label: `${formatShortDate(start)} - ${formatShortDate(end)}`
                    });

                    currentDate = new Date(end);
                    currentDate.setDate(currentDate.getDate() + 1);
                }
                return weeks;
            };

            const calendarWeeks = useCalendar ? getMonthWeeks(year, monthIndex) : [];
            const manualWeeks = data.weeks || 4;
            const psLevels = data.psLevels || [];
            
            // Tel altijd op tot en met 6 weken voor de zekerheid
            let total = 0; 
            for(let i=1; i<=6; i++) total += Number(data[`week${i}`])||0;
            const profit = total * 0.29184;
            const earnedLevels = psLevels.filter(l => total >= (Number(l.amount)||0)).length;

            const toggleReceived = (id) => { 
                const newLevels = psLevels.map(l => l.id === id ? { ...l, received: !l.received } : l); 
                updateMonthData(month, 'psLevels', newLevels); 
            };

            return (
                <React.Fragment>
                    <tr onClick={()=>setExpanded(!expanded)} className={`cursor-pointer border-b border-emerald-100 dark:border-emerald-800 transition-colors ${expanded?'bg-emerald-50 dark:bg-emerald-900/20':''}`}>
                        <td className="p-2 sm:p-4 font-medium text-slate-700 dark:text-slate-200 flex items-center gap-2">
                            {expanded ? <Icons.ChevronUp className="text-emerald-500"/> : <Icons.ChevronDown className="text-emerald-300 dark:text-emerald-700"/>} 
                            <div className="flex-grow">
                                <div className="font-semibold flex items-center gap-2">
                                    {month}
                                </div>
                                {earnedLevels > 0 && <div className="sm:hidden text-xs text-emerald-600 dark:text-emerald-400 flex items-center gap-1 mt-1 font-medium"><Icons.Gift className="w-3 h-3"/> {earnedLevels} Cadeaus</div>}
                            </div>
                        </td>
                        <td className="p-2 sm:p-4 font-bold text-sm sm:text-lg text-slate-700 dark:text-slate-200">{formatCurrency(total)}</td>
                        <td className="p-2 sm:p-4 font-bold text-sm sm:text-lg text-right text-emerald-700 dark:text-emerald-400 font-mono">{formatCurrency(profit)}</td>
                    </tr>
                    {expanded && (
                        <tr className="bg-emerald-50/50 dark:bg-emerald-900/10">
                            <td colSpan="3" className="p-0 border-b border-emerald-200 dark:border-emerald-800">
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 p-4 sm:p-6 animate-in">
                                    {/* LINKER KOLOM: WEKEN */}
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-center pb-2 border-b border-emerald-200/50 dark:border-emerald-700/50">
                                            <span className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase flex items-center gap-2">
                                                {useCalendar && <Icons.Calendar className="text-emerald-500" />}
                                                {useCalendar ? `Verkoop Kalender (${year})` : 'Verkoop'}
                                            </span>
                                            {!useCalendar && (
                                                <div className="flex bg-white dark:bg-slate-800 rounded-lg p-1 border border-emerald-100 dark:border-slate-600 shadow-sm">{[4,5].map(n=><button key={n} onClick={(e)=>{e.stopPropagation();updateMonthData(month,'weeks',n)}} className={`px-3 py-1 rounded text-xs font-bold ${manualWeeks===n?'bg-emerald-500 text-white':'text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700'}`}>{n}</button>)}</div>
                                            )}
                                        </div>
                                        <div className="grid grid-cols-1 gap-3">
                                            {useCalendar ? (
                                                calendarWeeks.map((weekInfo, index) => {
                                                    const w = index + 1;
                                                    const weekVal = Number(data[`week${w}`]) || 0;
                                                    const weekProfit = weekVal * 0.29184;
                                                    return (
                                                        <div key={w} className="flex flex-col gap-1.5 bg-white dark:bg-slate-800 p-3 rounded-lg border border-emerald-50 dark:border-slate-700 shadow-sm transition-all hover:border-emerald-200 dark:hover:border-slate-600">
                                                            <div className="flex justify-between items-center text-[10px] text-slate-400 dark:text-slate-500">
                                                                <span className="font-bold uppercase tracking-wider text-emerald-600 dark:text-emerald-400">Week {w}</span>
                                                                <span className="bg-slate-100 dark:bg-slate-700 px-2 py-0.5 rounded font-medium">{weekInfo.label}</span>
                                                            </div>
                                                            <div className="flex items-center gap-3">
                                                                <div className="bg-emerald-100 dark:bg-emerald-900 text-emerald-700 dark:text-emerald-300 w-10 h-10 rounded-full flex justify-center items-center text-base font-bold shadow-sm shrink-0">{w}</div>
                                                                <div className="flex-grow">
                                                                    <input 
                                                                        type="text" 
                                                                        inputMode="decimal"
                                                                        placeholder="0.00" 
                                                                        value={data[`week${w}`]||''} 
                                                                        onClick={e=>e.stopPropagation()} 
                                                                        onChange={e=>{
                                                                            const val = e.target.value.replace(',', '.');
                                                                            if (/^\d*\.?\d*$/.test(val)) updateMonthData(month,`week${w}`,val);
                                                                        }} 
                                                                        className="w-full pl-2 pr-2 py-2 rounded border border-slate-200 dark:border-slate-600 dark:bg-slate-700 dark:text-white outline-none text-base font-mono"
                                                                    />
                                                                </div>
                                                                <div className="text-right shrink-0 min-w-[70px]">
                                                                    <div className="text-[10px] text-slate-400 dark:text-slate-500 uppercase font-bold">Winst</div>
                                                                    <div className="font-mono font-bold text-emerald-600 dark:text-emerald-400 text-sm">{formatCurrency(weekProfit)}</div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    )
                                                })
                                            ) : (
                                                Array.from({length:manualWeeks},(_,i)=>i+1).map(w => {
                                                    const weekVal = Number(data[`week${w}`]) || 0;
                                                    const weekProfit = weekVal * 0.29184;
                                                    return (
                                                        <div key={w} className="flex items-center gap-3 bg-white dark:bg-slate-800 p-3 rounded-lg border border-emerald-50 dark:border-slate-700 shadow-sm">
                                                            <div className="bg-emerald-100 dark:bg-emerald-900 text-emerald-700 dark:text-emerald-300 w-10 h-10 rounded-full flex justify-center items-center text-base font-bold shadow-sm shrink-0">{w}</div>
                                                            <div className="flex-grow">
                                                                <input 
                                                                    type="text" 
                                                                    inputMode="decimal"
                                                                    placeholder="0.00" 
                                                                    value={data[`week${w}`]||''} 
                                                                    onClick={e=>e.stopPropagation()} 
                                                                    onChange={e=>{
                                                                        const val = e.target.value.replace(',', '.');
                                                                        if (/^\d*\.?\d*$/.test(val)) updateMonthData(month,`week${w}`,val);
                                                                    }} 
                                                                    className="w-full pl-2 pr-2 py-2 rounded border border-slate-200 dark:border-slate-600 dark:bg-slate-700 dark:text-white outline-none text-base font-mono"
                                                                />
                                                            </div>
                                                            <div className="text-right shrink-0 min-w-[70px]">
                                                                <div className="text-[10px] text-slate-400 dark:text-slate-500 uppercase font-bold">Winst</div>
                                                                <div className="font-mono font-bold text-emerald-600 dark:text-emerald-400 text-sm">{formatCurrency(weekProfit)}</div>
                                                            </div>
                                                        </div>
                                                    );
                                                })
                                            )}
                                        </div>
                                    </div>

                                    {/* RECHTER KOLOM: PS BELONINGEN */}
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-center pb-2 border-b border-emerald-200/50 dark:border-emerald-700/50">
                                            <span className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase">PS Beloningen</span>
                                            <button onClick={(e)=>{e.stopPropagation();setIsModalOpen(true)}} className="flex items-center gap-1 text-xs px-3 py-1.5 bg-emerald-100 text-emerald-700 dark:bg-emerald-900 dark:text-emerald-300 hover:bg-emerald-200 rounded-lg font-medium"><Icons.Settings className="w-3"/> Instellen</button>
                                        </div>
                                        <div className="space-y-3">
                                            {psLevels.length === 0 ? <div className="text-center py-8 text-slate-400 dark:text-slate-500 border-2 border-dashed dark:border-slate-700 rounded-xl"><p>Nog geen beloningen ingesteld.</p></div> : 
                                                psLevels.sort((a,b)=>(Number(a.amount)||0)-(Number(b.amount)||0)).map((level, index) => {
                                                    const amt = Number(level.amount)||0; const unlocked = total >= amt && amt > 0;
                                                    return (
                                                        <div key={level.id} className={`bg-white dark:bg-slate-800 rounded-xl border overflow-hidden ${unlocked ? 'border-emerald-500 shadow-md ring-1 ring-emerald-500' : 'border-emerald-100 dark:border-slate-700 shadow-sm'}`}>
                                                            <div className={`h-1.5 w-full ${unlocked ? 'bg-emerald-500' : 'bg-slate-100 dark:bg-slate-700'}`}>{!unlocked && amt > 0 && <div className="h-full bg-emerald-400" style={{ width: `${Math.min(100, (total/amt)*100)}%` }}></div>}</div>
                                                            <div className="p-3 flex gap-3 items-center">
                                                                <div className="w-16 h-16 shrink-0 rounded-lg bg-slate-50 dark:bg-slate-700 border flex items-center justify-center overflow-hidden relative">
                                                                    {level.image ? <img src={level.image} className="w-full h-full object-cover"/> : <Icons.Image className="text-2xl text-slate-300"/>}
                                                                </div>
                                                                <div className="flex-grow min-w-0">
                                                                    <div className="flex flex-col mb-1"><span className="text-[9px] font-bold text-slate-400 uppercase tracking-wide">{level.label || `PS ${index+1}`}</span><h4 className="font-bold text-slate-700 dark:text-slate-200 text-sm truncate">{level.name||'Naamloos'}</h4></div>
                                                                    <div className="text-xs mt-1">{unlocked ? (<div className="flex items-center gap-2">{level.received ? (<span className="flex items-center gap-1 text-blue-600 dark:text-blue-300 font-bold bg-blue-50 dark:bg-blue-900/30 px-2 py-1 rounded-md cursor-pointer border border-blue-100 dark:border-blue-800" onClick={(e) => {e.stopPropagation(); toggleReceived(level.id);}}><Icons.Check className="w-3"/> ONTVANGEN!</span>) : (<><span className="flex items-center gap-1 text-emerald-600 dark:text-emerald-400 font-bold animate-pulse"><Icons.CheckCircle className="w-3"/> BEHAALD!</span><button onClick={(e) => { e.stopPropagation(); toggleReceived(level.id); }} className="bg-emerald-50 hover:bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-300 border border-emerald-200 dark:border-emerald-800 px-2 py-0.5 rounded text-[10px] transition-colors">Ontvangen?</button></>)}</div>) : <span className="text-slate-400">Nog <span className="font-medium text-slate-600 dark:text-slate-400">{formatCurrency(Math.max(0, amt-total))}</span></span>}</div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    );
                                                })
                                            }
                                        </div>
                                    </div>
                                </div>
                            </td>
                        </tr>
                    )}
                    <PsManagementModal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} psLevels={psLevels} updatePsLevels={(newLevels) => updateMonthData(month, 'psLevels', newLevels)} user={user} />
                </React.Fragment>
            )
        };

        // --- HOOFD DASHBOARD ---
        function DashboardPage() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [selectedYear, setSelectedYear] = useState(new Date().getFullYear());
            const [monthlyData, setMonthlyData] = useState({});
            
            // UI State
            const [activeTab, setActiveTab] = useState('overview');
            const [showAdminModal, setShowAdminModal] = useState(false);
            const [viewingUser, setViewingUser] = useState(null); 
            const [showProfileMenu, setShowProfileMenu] = useState(false);
            const [darkMode, setDarkMode] = useState(localStorage.getItem('theme') === 'dark');
            const [showMobileMenu, setShowMobileMenu] = useState(false); 
            const [userPermissions, setUserPermissions] = useState({ showStock: true, showRequests: true, showCustomers: true, showRecipes: true, showClub: true });

            useEffect(() => {
                const unsub = window.auth.onAuthStateChanged(u => {
                    if (!u) window.location.href = 'index.html'; 
                    else { setUser(u); setLoading(false); }
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (darkMode) { document.documentElement.classList.add('dark'); localStorage.setItem('theme', 'dark'); } 
                else { document.documentElement.classList.remove('dark'); localStorage.setItem('theme', 'light'); }
            }, [darkMode]);

            const targetUid = viewingUser ? viewingUser.uid : (user ? user.uid : null);
            const isAdmin = user && ADMIN_EMAILS.includes(user.email);

            // DATA OPHALEN
            useEffect(() => {
                if (!targetUid || !window.db) return;
                
                // 1. Haal maand data op
                const unsubData = window.db.collection('users').doc(targetUid).collection('years').doc(String(selectedYear)).collection('months')
                    .onSnapshot(snap => {
                        const d = {};
                        snap.forEach(doc => d[doc.id] = doc.data());
                        setMonthlyData(d);
                    });

                // 2. Haal permissies op
                const unsubPerms = window.db.collection('users').doc(targetUid).collection('settings').doc('config')
                    .onSnapshot(doc => {
                        if (doc.exists) setUserPermissions(doc.data());
                        else setUserPermissions({ showStock: true, showRequests: true, showCustomers: true, showRecipes: true, showClub: true }); 
                    });

                return () => { unsubData(); unsubPerms(); };
            }, [targetUid, selectedYear]);

            const updateMonthData = async (month, field, value) => {
                if(!targetUid) return;
                await window.db.collection('users').doc(targetUid).collection('years').doc(String(selectedYear)).collection('months').doc(month).set({
                    [field]: value, userId: targetUid, userName: viewingUser ? viewingUser.name : user.displayName, yearId: selectedYear, monthId: month
                }, { merge: true });
            };

            const formatCurrency = (val) => new Intl.NumberFormat('nl-NL', { style: 'currency', currency: 'EUR' }).format(val || 0);

            if (loading) return <div className="h-screen flex items-center justify-center text-emerald-600 bg-slate-50 dark:bg-dark-bg"><Icons.Loader className="text-4xl"/></div>;

            return (
                <div className={`min-h-screen pb-20 transition-colors ${viewingUser ? 'bg-amber-50 dark:bg-amber-950' : 'bg-slate-50 dark:bg-dark-bg'}`}>
                    {/* Header */}
                    <header className={`${viewingUser ? 'bg-amber-600 dark:bg-amber-800' : 'bg-emerald-600 dark:bg-emerald-800'} text-white shadow-md sticky top-0 z-30 transition-colors`}>
                        <div className="max-w-4xl mx-auto px-4 py-3 relative flex items-center justify-between">
                            {/* HAMBURGER MENU VOOR MOBIEL */}
                            <button onClick={() => setShowMobileMenu(!showMobileMenu)} className="sm:hidden text-white text-xl">
                                <Icons.Bars />
                            </button>

                            <h1 className="font-bold text-lg flex items-center gap-2 select-none absolute left-1/2 transform -translate-x-1/2 sm:static sm:translate-x-0">
                                {viewingUser ? <Icons.Shield/> : <img src="favicon-32x32.png" className="w-6 h-6 bg-white rounded-full"/>}
                                <span className="hidden sm:inline">Tupperlife {viewingUser ? '(ADMIN)' : ''}</span>
                                <span className="sm:hidden">{viewingUser ? 'ADMIN' : 'Tupperlife'}</span>
                            </h1>
                            
                            {/* PROFIEL RECHTS */}
                            <div className="relative">
                                <button onClick={()=>setShowProfileMenu(!showProfileMenu)} className="w-9 h-9 rounded-full bg-white/20 hover:bg-white/30 flex items-center justify-center border border-white/40">
                                    {user.photoURL ? <img src={user.photoURL} className="w-full h-full rounded-full object-cover"/> : <Icons.User/>}
                                </button>
                                {showProfileMenu && (
                                    <React.Fragment>
                                        <div className="fixed inset-0 z-10" onClick={()=>setShowProfileMenu(false)}></div>
                                        <div className="absolute right-0 mt-2 w-56 bg-white dark:bg-dark-card rounded-xl shadow-xl border border-slate-100 dark:border-slate-700 z-20 text-slate-700 dark:text-slate-200 py-1">
                                            <div className="px-4 py-2 border-b dark:border-slate-700 text-sm font-bold truncate">{user.displayName}</div>
                                            
                                            {/* DARK MODE TOGGLE */}
                                            <div className="px-4 py-2 border-b dark:border-slate-700 flex items-center justify-between">
                                                <span className="text-sm font-medium flex items-center gap-2"><Icons.Moon className="text-slate-400"/> Donkere modus</span>
                                                <button onClick={()=>setDarkMode(!darkMode)} className={`w-10 h-5 rounded-full relative transition-colors ${darkMode ? 'bg-emerald-500' : 'bg-slate-300'}`}>
                                                    <div className={`absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full transition-transform shadow-sm ${darkMode ? 'translate-x-5' : ''}`}></div>
                                                </button>
                                            </div>

                                            {isAdmin && <button onClick={()=>{setShowAdminModal(true);setShowProfileMenu(false)}} className="w-full text-left px-4 py-2 hover:bg-amber-50 dark:hover:bg-amber-900/30 text-amber-600 dark:text-amber-400 font-bold flex gap-2 items-center"><Icons.Users/> Beheer Gebruikers</button>}
                                            <button onClick={()=>window.auth.signOut()} className="w-full text-left px-4 py-2 hover:bg-red-50 dark:hover:bg-red-900/30 text-red-600 dark:text-red-400 flex gap-2 items-center"><Icons.LogOut/> Uitloggen</button>
                                        </div>
                                    </React.Fragment>
                                )}
                            </div>
                        </div>
                        {viewingUser && <div className="bg-amber-100 dark:bg-amber-900 text-amber-900 dark:text-amber-100 text-center text-xs font-bold py-1 flex justify-center gap-2"><span>Je bekijkt nu: {viewingUser.name}</span> <button onClick={()=>setViewingUser(null)} className="underline">Terug</button></div>}
                    </header>

                    {/* MOBILE MENU DROPDOWN */}
                    {showMobileMenu && (
                        <div className="sm:hidden bg-white dark:bg-dark-card border-b dark:border-slate-700 shadow-md absolute w-full z-20 animate-in">
                            <div className="flex flex-col p-2">
                                {['overview', 'requests', 'stock', 'recipes', 'customers'].map(tab => {
                                    if(tab === 'requests' && !userPermissions.showRequests && !isAdmin) return null;
                                    if(tab === 'stock' && !userPermissions.showStock && !isAdmin) return null;
                                    if(tab === 'recipes' && !userPermissions.showRecipes && !isAdmin) return null;
                                    if(tab === 'customers' && !userPermissions.showCustomers && !isAdmin) return null;

                                    const labels = { overview: 'Overzicht', requests: 'Wensen', stock: 'Voorraad', recipes: 'Recepten', customers: 'Klanten' };
                                    const icons = {
                                        overview: '',
                                        requests: !userPermissions.showRequests && <Icons.Lock className="text-[10px] ml-1 opacity-50"/>,
                                        stock: !userPermissions.showStock && <Icons.Lock className="text-[10px] ml-1 opacity-50"/>,
                                        recipes: !userPermissions.showRecipes && <Icons.Lock className="text-[10px] ml-1 opacity-50"/>,
                                        customers: !userPermissions.showCustomers && <Icons.Lock className="text-[10px] ml-1 opacity-50"/>
                                    };
                                    
                                    return (
                                        <button key={tab} onClick={()=>{setActiveTab(tab); setShowMobileMenu(false)}} className={`text-left px-4 py-3 rounded-md text-sm font-bold transition-all ${activeTab===tab?'bg-emerald-50 dark:bg-slate-700 text-emerald-700 dark:text-emerald-300':'text-slate-600 dark:text-slate-400'}`}>
                                            {labels[tab]} {icons[tab]}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    <div className="max-w-4xl mx-auto p-4 animate-in">
                        {/* Navigatie Balk (Desktop) */}
                        <div className="hidden sm:flex flex-row gap-3 items-center justify-between bg-white dark:bg-dark-card p-2 rounded-xl border border-emerald-100 dark:border-slate-700 shadow-sm mb-6">
                            <div className="flex gap-1 bg-slate-100 dark:bg-slate-800 rounded-lg p-1 w-auto overflow-x-auto">
                                {['overview', 'requests', 'stock', 'recipes', 'customers'].map(tab => {
                                    if(tab === 'requests' && !userPermissions.showRequests && !isAdmin) return null;
                                    if(tab === 'stock' && !userPermissions.showStock && !isAdmin) return null;
                                    if(tab === 'recipes' && !userPermissions.showRecipes && !isAdmin) return null;
                                    if(tab === 'customers' && !userPermissions.showCustomers && !isAdmin) return null;

                                    const labels = { overview: 'Overzicht', requests: 'Wensen', stock: 'Voorraad', recipes: 'Recepten', customers: 'Klanten' };
                                    const icons = {
                                        overview: '',
                                        requests: !userPermissions.showRequests && <Icons.Lock className="text-[10px] ml-1 opacity-50"/>,
                                        stock: !userPermissions.showStock && <Icons.Lock className="text-[10px] ml-1 opacity-50"/>,
                                        recipes: !userPermissions.showRecipes && <Icons.Lock className="text-[10px] ml-1 opacity-50"/>,
                                        customers: !userPermissions.showCustomers && <Icons.Lock className="text-[10px] ml-1 opacity-50"/>
                                    };
                                    
                                    return (
                                        <button key={tab} onClick={()=>setActiveTab(tab)} className={`whitespace-nowrap px-4 py-2 rounded-md text-sm font-bold transition-all ${activeTab===tab?'bg-white dark:bg-slate-600 shadow text-emerald-700 dark:text-emerald-300':'text-slate-500 dark:text-slate-400 hover:text-emerald-600 dark:hover:text-emerald-300'}`}>
                                            {labels[tab]} {icons[tab]}
                                        </button>
                                    );
                                })}
                            </div>
                            
                            {activeTab === 'overview' && (
                                <select value={selectedYear} onChange={e=>setSelectedYear(Number(e.target.value))} className="bg-emerald-50 dark:bg-emerald-900/30 text-emerald-800 dark:text-emerald-200 font-bold px-4 py-2 rounded-lg border-emerald-100 dark:border-emerald-800 border outline-none cursor-pointer hover:bg-emerald-100 dark:hover:bg-emerald-900/50 transition-colors">
                                    {[0,1,2,3,4].map(i => <option key={i} value={new Date().getFullYear()-2+i}>{new Date().getFullYear()-2+i}</option>)}
                                </select>
                            )}
                        </div>

                        {/* Mobiele Titelbalk (als vervanging voor tabs) */}
                        <div className="sm:hidden flex items-center justify-between bg-white dark:bg-dark-card p-3 rounded-xl border border-emerald-100 dark:border-slate-700 shadow-sm mb-4">
                            <span className="font-bold text-slate-700 dark:text-slate-200">
                                {activeTab === 'overview' && 'Overzicht'}
                                {activeTab === 'requests' && 'Wensen'}
                                {activeTab === 'stock' && 'Voorraad'}
                                {activeTab === 'recipes' && 'Recepten'}
                                {activeTab === 'customers' && 'Klanten'}
                            </span>
                            {activeTab === 'overview' && (
                                <select value={selectedYear} onChange={e=>setSelectedYear(Number(e.target.value))} className="bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 font-bold px-2 py-1 rounded border-none outline-none text-sm">
                                    {[0,1,2,3,4].map(i => <option key={i} value={new Date().getFullYear()-2+i}>{new Date().getFullYear()-2+i}</option>)}
                                </select>
                            )}
                        </div>

                        {/* Inhoud */}
                        {activeTab === 'overview' && (
                            <div className="space-y-6">
                                {/* CLUB GOLD MODULE Boven de maanden */}
                                {(userPermissions.showClub || isAdmin) && (
                                    <ClubTab targetUid={targetUid} monthlyData={monthlyData} selectedYear={selectedYear} formatCurrency={formatCurrency} />
                                )}

                                {/* MAANDEN TABEL */}
                                <div className="bg-white dark:bg-dark-card rounded-xl shadow-sm border border-emerald-100 dark:border-emerald-900 overflow-hidden">
                                    <table className="w-full text-left">
                                        <thead className="bg-emerald-50 dark:bg-emerald-900/20 text-emerald-900 dark:text-emerald-200 border-b border-emerald-100 dark:border-emerald-900"><tr><th className="p-2 sm:p-4">Maand</th><th className="p-2 sm:p-4">Verkoop</th><th className="p-2 sm:p-4 text-right">Winst</th></tr></thead>
                                        <tbody>
                                            {MONTHS.map((m, index) => <MonthRow key={m} month={m} monthIndex={index} year={selectedYear} data={monthlyData[m]||{}} updateMonthData={updateMonthData} formatCurrency={formatCurrency} user={user} />)}
                                        </tbody>
                                        <tfoot className="bg-emerald-600 dark:bg-emerald-800 text-white font-bold">
                                            <tr>
                                                <td className="p-2 sm:p-4">Totaal</td>
                                                <td className="p-2 sm:p-4 text-sm sm:text-lg">{formatCurrency(MONTHS.reduce((acc,m)=>{let t=0;for(let i=1;i<=6;i++)t+=Number((monthlyData[m]||{})[`week${i}`])||0;return acc+t},0))}</td>
                                                <td className="p-2 sm:p-4 text-sm sm:text-lg text-right">{formatCurrency(MONTHS.reduce((acc,m)=>{let t=0;for(let i=1;i<=6;i++)t+=Number((monthlyData[m]||{})[`week${i}`])||0;return acc+(t*0.29184)},0))}</td>
                                            </tr>
                                        </tfoot>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'requests' && ((userPermissions.showRequests || isAdmin) ? <RequestsTab targetUid={targetUid}/> : <div className="text-center p-10 text-slate-400">Deze module is uitgeschakeld voor u.</div>)}
                        {activeTab === 'stock' && ((userPermissions.showStock || isAdmin) ? <StockTab targetUid={targetUid} user={user}/> : <div className="text-center p-10 text-slate-400">Deze module is uitgeschakeld voor u.</div>)}
                        {activeTab === 'recipes' && ((userPermissions.showRecipes || isAdmin) ? <RecipesTab targetUid={targetUid}/> : <div className="text-center p-10 text-slate-400">Deze module is uitgeschakeld voor u.</div>)}
                        {activeTab === 'customers' && ((userPermissions.showCustomers || isAdmin) ? <CustomersTab targetUid={targetUid}/> : <div className="text-center p-10 text-slate-400">Deze module is uitgeschakeld voor u.</div>)}
                    </div>

                    <AdminUserModal isOpen={showAdminModal} onClose={()=>setShowAdminModal(false)} selectedYear={selectedYear} onSelectUser={(u)=>{setViewingUser(u);setShowAdminModal(false)}}/>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DashboardPage />);
    </script>
</body>
</html>
